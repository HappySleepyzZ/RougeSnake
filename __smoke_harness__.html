<!doctype html>
<html>
<head><meta charset="utf-8"><title>snake smoke harness</title></head>
<body>
<pre id="out">running</pre>
<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const page = params.get('page');
  const inject = params.get('inject') === '1';
  const out = document.getElementById('out');
  function fail(message, extra) {
    document.body.setAttribute('data-pass', 'false');
    out.textContent = JSON.stringify({ ok: false, message, extra }, null, 2);
  }
  function pass(result) {
    document.body.setAttribute('data-pass', 'true');
    out.textContent = JSON.stringify({ ok: true, result }, null, 2);
  }
  function wait(ms) {
    return new Promise((resolve) => setTimeout(resolve, ms));
  }
  if (!page) {
    fail('missing page parameter');
    return;
  }
  const targetUrl = new URL(page + (page.includes('?') ? '&' : '?') + 'test=1', location.href);
  const targetHtml = await fetch(targetUrl).then((response) => response.text());
  const injectedPrelude = `
    <base href="${targetUrl.href}">
    <script>
      window.__smokeErrors = [];
      window.addEventListener('error', function(event) {
        window.__smokeErrors.push({
          type: 'error',
          message: event.message,
          filename: event.filename,
          lineno: event.lineno,
          colno: event.colno
        });
      });
      window.addEventListener('unhandledrejection', function(event) {
        var reason = event.reason;
        window.__smokeErrors.push({
          type: 'unhandledrejection',
          message: reason && reason.message ? reason.message : String(reason)
        });
      });
    <\/script>
  `;
  const patchedHtml = targetHtml.replace('<head>', `<head>${injectedPrelude}`);
  const iframe = document.createElement('iframe');
  iframe.style.width = '1280px';
  iframe.style.height = '900px';
  document.body.appendChild(iframe);
  if (inject) {
    iframe.srcdoc = patchedHtml;
  } else {
    iframe.src = targetUrl.href;
  }
  try {
    await new Promise((resolve) => setTimeout(resolve, 1200));
    if (!iframe.contentWindow) {
      fail('iframe contentWindow unavailable');
      return;
    }
    try {
      const api = iframe.contentWindow.__snakeTestApi__;
      const smokeErrors = iframe.contentWindow.__smokeErrors || [];
      if (!api) {
        const doc = iframe.contentWindow.document;
        const moduleButtons = doc.getElementById('moduleButtons');
        let manualBuildResult = null;
        if (inject && typeof iframe.contentWindow.buildModuleButtons === 'function') {
          try {
            iframe.contentWindow.buildModuleButtons();
            manualBuildResult = {
              ok: true,
              moduleButtonCountAfterCall: moduleButtons ? moduleButtons.children.length : null
            };
          } catch (error) {
            manualBuildResult = {
              ok: false,
              message: error && error.message ? error.message : String(error),
              stack: error && error.stack ? error.stack : null
            };
          }
        }
        fail('missing __snakeTestApi__', {
          readyState: doc.readyState,
          title: iframe.contentWindow.document.title,
          moduleButtonCount: moduleButtons ? moduleButtons.children.length : null,
          hasBuildModuleButtons: typeof iframe.contentWindow.buildModuleButtons,
          hasApplyModeConfig: typeof iframe.contentWindow.applyModeConfig,
          hasSnakeRuntimeState: typeof iframe.contentWindow.SnakeRuntimeState,
          hasSnakeInputHelpers: typeof iframe.contentWindow.SnakeInputHelpers,
          hasSnakeUiOverlays: typeof iframe.contentWindow.SnakeUiOverlays,
          hasSnakeDebugApi: typeof iframe.contentWindow.SnakeDebugApi,
          smokeErrors,
          manualBuildResult,
          moduleTypesCount: iframe.contentWindow.MODULE_TYPES ? Object.keys(iframe.contentWindow.MODULE_TYPES).length : null,
          bodyTextSample: doc.body ? doc.body.innerText.slice(0, 200) : null
        });
        return;
      }
      if (typeof api.getState !== 'function' || typeof api.setState !== 'function') {
        fail('missing getState/setState', { keys: Object.keys(api) });
        return;
      }
      const before = api.getState();
      api.setState({
        score: 321,
        currentWave: 9,
        showTutorial: false,
        isGameRunning: false,
        isWaitingForStart: true,
        resultVisible: true,
        pauseVisible: false,
        waveVisible: false,
        shopVisible: false
      });
      const after = api.getState();
      const checks = {
        score: after.score === 321,
        currentWave: after.currentWave === 9,
        showTutorial: after.showTutorial === false,
        isWaitingForStart: after.isWaitingForStart === true,
        resultVisible: after.resultVisible === true,
        apiKeys: Object.keys(api).length > 0
      };
      const failed = Object.entries(checks).filter(([, ok]) => !ok);
      if (failed.length) {
        fail('assertions failed', { checks, before, after, apiKeys: Object.keys(api) });
        return;
      }
      const doc = iframe.contentWindow.document;
      const modeOverlay = doc.getElementById('modeOverlay');
      const moduleButtons = Array.from(doc.querySelectorAll('#moduleButtons .mode-btn'));
      if (!modeOverlay || moduleButtons.length === 0) {
        fail('missing module selection UI', {
          hasModeOverlay: !!modeOverlay,
          moduleButtonCount: moduleButtons.length
        });
        return;
      }

      const armorModuleButton = moduleButtons.find((button) => button.textContent.includes('装甲'));
      const selectedModuleButton = armorModuleButton || moduleButtons[0];
      selectedModuleButton.click();
      await wait(50);

      const afterModuleSelect = api.getState();
      const interactionChecks = {
        hasSelectedMode: afterModuleSelect.hasSelectedMode === true,
        modeOverlayHidden: modeOverlay.classList.contains('hidden'),
        armorModuleSelected: !!(afterModuleSelect.selectedModule && afterModuleSelect.selectedModule.id === 'armor')
      };

      api.startGame();
      await wait(50);

      const afterGameplayInput = api.getState();
      Object.assign(interactionChecks, {
        enteredRunningState: afterGameplayInput.isGameRunning === true,
        leftWaitingState: afterGameplayInput.isWaitingForStart === false
      });

      const barrierBefore = Array.isArray(afterGameplayInput.obstacles) ? afterGameplayInput.obstacles.length : null;
      let barrierAfter = barrierBefore;
      if (typeof api.forceSpawnBarrier === 'function') {
        api.forceSpawnBarrier();
        await wait(20);
        const afterBarrierSpawn = api.getState();
        barrierAfter = Array.isArray(afterBarrierSpawn.obstacles) ? afterBarrierSpawn.obstacles.length : null;
        Object.assign(interactionChecks, {
          barrierSpawned: typeof barrierBefore === 'number' && typeof barrierAfter === 'number' && barrierAfter >= barrierBefore
        });
      }

      let timerTraceSnapshot = null;
      let timerTraceLength = null;
      if (typeof api.captureTimerTrace === 'function' && typeof api.getTimerTrace === 'function') {
        timerTraceSnapshot = api.captureTimerTrace();
        const timerTrace = api.getTimerTrace();
        timerTraceLength = Array.isArray(timerTrace) ? timerTrace.length : null;
        Object.assign(interactionChecks, {
          timerTraceCaptured: !!(timerTraceSnapshot && typeof timerTraceSnapshot.currentWave === 'number'),
          timerTraceBuffered: typeof timerTraceLength === 'number' && timerTraceLength > 0
        });
      }

      let afterShowResult = null;
      if (typeof api.showResult === 'function') {
        api.showResult('death');
        await wait(20);
        afterShowResult = api.getState();
        Object.assign(interactionChecks, {
          resultOverlayVisible: afterShowResult.resultVisible === true
        });
        if (typeof api.hideResult === 'function') {
          api.hideResult();
          await wait(20);
        }
      }

      let afterOpenShop = null;
      let afterShopPurchase = null;
      let afterCloseShop = null;
      let shopItemCount = null;
      let afterClearPurchase = null;
      let afterShieldPurchase = null;
      let afterShieldSnakeSkinStep = null;
      if (typeof api.openShop === 'function') {
        api.setState({ coins: 99 });
        api.openShop();
        await wait(20);
        afterOpenShop = api.getState();
        const shopItems = Array.from(doc.querySelectorAll('#shopItems .restart-btn'));
        shopItemCount = shopItems.length;
        Object.assign(interactionChecks, {
          shopOpened: afterOpenShop.shopOpen === true || afterOpenShop.shopOpening === true,
          shopItemsRendered: shopItemCount > 0
        });

        const purchasableButton = shopItems.find((button) => !button.disabled);
        if (purchasableButton) {
          purchasableButton.click();
          await wait(20);
          afterShopPurchase = api.getState();
          Object.assign(interactionChecks, {
            shopClosedAfterPurchase: afterShopPurchase.shopOpen === false && afterShopPurchase.shopOpening === false,
            enteredWaveTransitionAfterPurchase: afterShopPurchase.isWaveTransition === true
          });
        } else {
          const shopSkipBtn = doc.getElementById('shopSkipBtn');
          if (shopSkipBtn) {
            shopSkipBtn.click();
            await wait(20);
            afterCloseShop = api.getState();
            Object.assign(interactionChecks, {
              shopClosed: afterCloseShop.shopOpen === false && afterCloseShop.shopOpening === false,
              enteredWaveTransition: afterCloseShop.isWaveTransition === true
            });
          }
        }
      }

      if (typeof api.openShop === 'function') {
        api.setState({
          coins: 99,
          snakeSkins: [{
            centerX: 8,
            centerY: 8,
            cells: [{ x: 8, y: 8 }],
            spawnTime: Date.now()
          }],
          obstacles: [{ x: 12, y: 12 }]
        });
        api.openShop();
        await wait(20);
        const clearButton = Array.from(doc.querySelectorAll('#shopItems .restart-btn'))
          .find((button) => button.textContent.includes('清障'));
        if (clearButton) {
          clearButton.click();
          await wait(20);
          afterClearPurchase = api.getState();
          Object.assign(interactionChecks, {
            clearItemOnlyRemovesSnakeSkins: Array.isArray(afterClearPurchase.snakeSkins)
              && afterClearPurchase.snakeSkins.length === 0
              && Array.isArray(afterClearPurchase.obstacles)
              && afterClearPurchase.obstacles.length === 1
          });
        } else {
          interactionChecks.clearItemOnlyRemovesSnakeSkins = false;
        }
      }

      if (typeof api.openShop === 'function' && typeof api.gameStep === 'function') {
        api.setState({
          coins: 99,
          shieldCharges: 0,
          snakeSkins: [],
          obstacles: []
        });
        api.openShop();
        await wait(20);
        const shieldButton = Array.from(doc.querySelectorAll('#shopItems .restart-btn'))
          .find((button) => button.textContent.includes('护盾'));
        if (shieldButton) {
          shieldButton.click();
          await wait(20);
          afterShieldPurchase = api.getState();
          const now = Date.now();
          api.setState({
            snake: [{ x: 5, y: 5 }, { x: 4, y: 5 }, { x: 3, y: 5 }],
            snakeSkins: [{
              centerX: 6,
              centerY: 5,
              cells: [{ x: 6, y: 5 }],
              spawnTime: now
            }],
            obstacles: [],
            foods: [],
            direction: { x: 1, y: 0 },
            nextDirection: { x: 1, y: 0 },
            currentWave: 1,
            gameStartTime: now,
            waveStartTime: now,
            isGameRunning: true,
            isWaitingForStart: false,
            isPaused: false,
            isWaveTransition: false,
            isLevelComplete: false,
            isGameOver: false,
            resultVisible: false,
            teleportInvincibleSteps: 0,
            teleportPreview: null,
            teleportTrailTimer: 0,
            headGlowTimer: 0
          });
          api.gameStep();
          await wait(20);
          afterShieldSnakeSkinStep = api.getState();
          Object.assign(interactionChecks, {
            shieldPurchaseGrantedCharge: afterShieldPurchase.shieldCharges === 1,
            shieldBlocksSnakeSkinCollision: afterShieldSnakeSkinStep.isGameOver === false
              && afterShieldSnakeSkinStep.shieldCharges === 0
              && Array.isArray(afterShieldSnakeSkinStep.snakeSkins)
              && afterShieldSnakeSkinStep.snakeSkins.length === 0
          });
        } else {
          interactionChecks.shieldPurchaseGrantedCharge = false;
          interactionChecks.shieldBlocksSnakeSkinCollision = false;
        }
      }

      let afterAdvanceWave = null;
      if (typeof api.advanceWave === 'function') {
        const waveBeforeAdvance = api.getState();
        api.advanceWave();
        await wait(20);
        afterAdvanceWave = api.getState();
        const terrainZones = Array.isArray(afterAdvanceWave.terrainZones) ? afterAdvanceWave.terrainZones : [];
        const portalPairs = Array.isArray(afterAdvanceWave.portalPairs) ? afterAdvanceWave.portalPairs : [];
        Object.assign(interactionChecks, {
          waveAdvanced: afterAdvanceWave.currentWave === waveBeforeAdvance.currentWave + 1,
          terrainGenerated: terrainZones.length > 0,
          portalsGenerated: portalPairs.length > 0
        });
      }

      let afterTerrainBonusSteps = null;
      if (typeof api.gameStep === 'function') {
        const now = Date.now();
        api.setState({
          snake: [{ x: 5, y: 5 }, { x: 4, y: 5 }, { x: 3, y: 5 }],
          foods: [],
          obstacles: [],
          terrainZones: [{
            type: 'slow',
            centerX: 6,
            centerY: 5,
            cells: [{ x: 5, y: 5 }, { x: 6, y: 5 }, { x: 7, y: 5 }]
          }],
          direction: { x: 1, y: 0 },
          nextDirection: { x: 1, y: 0 },
          score: 0,
          currentWave: 1,
          gameStartTime: now,
          waveStartTime: now,
          isGameRunning: true,
          isWaitingForStart: false,
          isPaused: false,
          isWaveTransition: false,
          isLevelComplete: false,
          isGameOver: false,
          teleportInvincibleSteps: 0,
          teleportPreview: null,
          teleportTrailTimer: 0,
          headGlowTimer: 0,
          slowDebuffEnd: 0,
          poisonDebuffEnd: 0,
          portalTeleportCooldown: 0
        });
        api.gameStep();
        api.gameStep();
        api.gameStep();
        await wait(20);
        afterTerrainBonusSteps = api.getState();
        Object.assign(interactionChecks, {
          armorSlowTerrainBonusApplied: afterTerrainBonusSteps.score === 12,
          slowDebuffApplied: typeof afterTerrainBonusSteps.slowDebuffEnd === 'number' && afterTerrainBonusSteps.slowDebuffEnd > now
        });
      }

      let afterBalancedPoisonStep = null;
      if (typeof api.gameStep === 'function' && iframe.contentWindow.MODULE_TYPES && iframe.contentWindow.MODULE_TYPES.BALANCED) {
        const originalRandom = iframe.contentWindow.Math.random;
        const now = Date.now();
        iframe.contentWindow.selectedModule = iframe.contentWindow.MODULE_TYPES.BALANCED;
        iframe.contentWindow.Math.random = () => 0;
        api.setState({
          snake: [{ x: 8, y: 8 }, { x: 7, y: 8 }, { x: 6, y: 8 }],
          foods: [],
          obstacles: [],
          terrainZones: [{
            type: 'poison',
            centerX: 8,
            centerY: 8,
            cells: [{ x: 8, y: 8 }, { x: 9, y: 8 }, { x: 7, y: 8 }]
          }],
          direction: { x: 1, y: 0 },
          nextDirection: { x: 1, y: 0 },
          score: 0,
          currentWave: 1,
          gameStartTime: now,
          waveStartTime: now,
          isGameRunning: true,
          isWaitingForStart: false,
          isPaused: false,
          isWaveTransition: false,
          isLevelComplete: false,
          isGameOver: false,
          teleportInvincibleSteps: 0,
          teleportPreview: null,
          teleportTrailTimer: 0,
          headGlowTimer: 0,
          slowDebuffEnd: 0,
          poisonDebuffEnd: 0,
          portalTeleportCooldown: 0
        });
        api.gameStep();
        await wait(20);
        afterBalancedPoisonStep = api.getState();
        iframe.contentWindow.Math.random = originalRandom;
        iframe.contentWindow.selectedModule = iframe.contentWindow.MODULE_TYPES.ARMOR;
        Object.assign(interactionChecks, {
          balancedPoisonHalfDotApplied: afterBalancedPoisonStep.score === -1,
          poisonDebuffApplied: typeof afterBalancedPoisonStep.poisonDebuffEnd === 'number' && afterBalancedPoisonStep.poisonDebuffEnd > now
        });
      }

      let afterTeleportStep = null;
      if (api.FOOD_TYPES && api.FOOD_TYPES.TELEPORT && typeof api.gameStep === 'function') {
        const now = Date.now();
        api.setState({
          snake: [{ x: 5, y: 5 }, { x: 4, y: 5 }, { x: 3, y: 5 }],
          foods: [{
            x: 6,
            y: 5,
            type: api.FOOD_TYPES.TELEPORT,
            pulsePhase: 0,
            dangerShakePhase: 0,
            windSpinPhase: 0
          }],
          obstacles: [],
          direction: { x: 1, y: 0 },
          nextDirection: { x: 1, y: 0 },
          currentWave: 1,
          gameStartTime: now,
          waveStartTime: now,
          isGameRunning: true,
          isWaitingForStart: false,
          isPaused: false,
          isWaveTransition: false,
          isLevelComplete: false,
          isGameOver: false,
          teleportInvincibleSteps: 0,
          teleportPreview: null,
          teleportTrailTimer: 0,
          headGlowTimer: 0
        });
        api.gameStep();
        await wait(20);
        afterTeleportStep = api.getState();
        Object.assign(interactionChecks, {
          teleportTriggered: afterTeleportStep.teleportInvincibleSteps === 3,
          teleportPreviewSet: !!afterTeleportStep.teleportPreview,
          teleportDirectionFlipped: afterTeleportStep.direction && afterTeleportStep.direction.x === -1 && afterTeleportStep.direction.y === 0
        });
      }

      let afterGameOverStep = null;
      if (typeof api.gameStep === 'function') {
        const now = Date.now();
        api.setState({
          snake: [{ x: -1, y: 5 }, { x: -2, y: 5 }, { x: -3, y: 5 }],
          foods: [],
          obstacles: [],
          direction: { x: -1, y: 0 },
          nextDirection: { x: -1, y: 0 },
          currentWave: 1,
          gameStartTime: now,
          waveStartTime: now,
          isGameRunning: true,
          isWaitingForStart: false,
          isPaused: false,
          isWaveTransition: false,
          isLevelComplete: false,
          isGameOver: false,
          teleportInvincibleSteps: 0,
          teleportPreview: null,
          teleportTrailTimer: 0,
          headGlowTimer: 0
        });
        api.gameStep();
        await wait(20);
        afterGameOverStep = api.getState();
        Object.assign(interactionChecks, {
          wallDeathTriggered: afterGameOverStep.isGameOver === true,
          resultVisibleAfterGameOver: afterGameOverStep.resultVisible === true,
          stoppedRunningAfterGameOver: afterGameOverStep.isGameRunning === false
        });
      }

      const interactionFailed = Object.entries(interactionChecks).filter(([, ok]) => !ok);
      if (interactionFailed.length) {
        fail('interaction assertions failed', {
          checks,
          interactionChecks,
          afterModuleSelect,
          afterGameplayInput,
          barrierBefore,
          barrierAfter,
          timerTraceSnapshot,
          timerTraceLength,
          afterShowResult,
          afterOpenShop,
          afterShopPurchase,
          afterCloseShop,
          afterClearPurchase,
          afterShieldPurchase,
          afterShieldSnakeSkinStep,
          afterAdvanceWave,
          afterTerrainBonusSteps,
          afterBalancedPoisonStep,
          afterTeleportStep,
          afterGameOverStep,
          shopItemCount,
          smokeErrors,
          modeOverlayClass: modeOverlay.className,
          moduleButtonCount: moduleButtons.length
        });
        return;
      }

      pass({
        checks,
        interactionChecks,
        beforeScore: before.score,
        afterScore: after.score,
        runningState: {
          isGameRunning: afterGameplayInput.isGameRunning,
          isWaitingForStart: afterGameplayInput.isWaitingForStart,
          hasSelectedMode: afterGameplayInput.hasSelectedMode
        },
        barrierBefore,
        barrierAfter,
        timerTraceSnapshot,
        timerTraceLength,
        resultVisibleAfterShow: afterShowResult ? afterShowResult.resultVisible : null,
        shopItemCount,
        shopStateAfterOpen: afterOpenShop ? { shopOpen: afterOpenShop.shopOpen, shopOpening: afterOpenShop.shopOpening } : null,
        shopStateAfterPurchase: afterShopPurchase ? {
          shopOpen: afterShopPurchase.shopOpen,
          shopOpening: afterShopPurchase.shopOpening,
          isWaveTransition: afterShopPurchase.isWaveTransition,
          coins: afterShopPurchase.coins
        } : null,
        shopStateAfterClose: afterCloseShop ? { shopOpen: afterCloseShop.shopOpen, shopOpening: afterCloseShop.shopOpening, isWaveTransition: afterCloseShop.isWaveTransition } : null,
        clearPurchaseState: afterClearPurchase ? {
          snakeSkinCount: Array.isArray(afterClearPurchase.snakeSkins) ? afterClearPurchase.snakeSkins.length : null,
          obstacleCount: Array.isArray(afterClearPurchase.obstacles) ? afterClearPurchase.obstacles.length : null
        } : null,
        shieldPurchaseState: afterShieldPurchase ? {
          shieldCharges: afterShieldPurchase.shieldCharges,
          shopOpen: afterShieldPurchase.shopOpen,
          isWaveTransition: afterShieldPurchase.isWaveTransition
        } : null,
        shieldSnakeSkinState: afterShieldSnakeSkinStep ? {
          isGameOver: afterShieldSnakeSkinStep.isGameOver,
          shieldCharges: afterShieldSnakeSkinStep.shieldCharges,
          snakeSkinCount: Array.isArray(afterShieldSnakeSkinStep.snakeSkins) ? afterShieldSnakeSkinStep.snakeSkins.length : null
        } : null,
        waveStateAfterAdvance: afterAdvanceWave ? {
          currentWave: afterAdvanceWave.currentWave,
          terrainZoneCount: Array.isArray(afterAdvanceWave.terrainZones) ? afterAdvanceWave.terrainZones.length : null,
          portalPairCount: Array.isArray(afterAdvanceWave.portalPairs) ? afterAdvanceWave.portalPairs.length : null
        } : null,
        terrainBonusStateAfterSteps: afterTerrainBonusSteps ? {
          score: afterTerrainBonusSteps.score,
          slowDebuffEnd: afterTerrainBonusSteps.slowDebuffEnd,
          selectedModule: afterTerrainBonusSteps.selectedModule ? afterTerrainBonusSteps.selectedModule.id : null
        } : null,
        balancedPoisonStateAfterStep: afterBalancedPoisonStep ? {
          score: afterBalancedPoisonStep.score,
          poisonDebuffEnd: afterBalancedPoisonStep.poisonDebuffEnd,
          selectedModule: afterBalancedPoisonStep.selectedModule ? afterBalancedPoisonStep.selectedModule.id : null
        } : null,
        teleportStateAfterStep: afterTeleportStep ? {
          teleportInvincibleSteps: afterTeleportStep.teleportInvincibleSteps,
          teleportPreview: afterTeleportStep.teleportPreview,
          direction: afterTeleportStep.direction
        } : null,
        gameOverStateAfterStep: afterGameOverStep ? {
          isGameOver: afterGameOverStep.isGameOver,
          isGameRunning: afterGameOverStep.isGameRunning,
          resultVisible: afterGameOverStep.resultVisible
        } : null,
        apiKeys: Object.keys(api)
      });
    } catch (error) {
      fail(error && error.message ? error.message : String(error), { stack: error && error.stack ? error.stack : null });
    }
  } catch (error) {
    fail(error && error.message ? error.message : String(error), { stack: error && error.stack ? error.stack : null });
  }
})();
</script>
</body>
</html>
