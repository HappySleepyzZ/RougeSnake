                        gradient.addColorStop(1, '#f1c40f');
                    } else {
                        gradient.addColorStop(0, hGlow);
                        gradient.addColorStop(1, hColor);
                    }
                } else {
                    // V18c: debuff 时蛇身变色
                    if (debuffBodyGradientOverride) {
                        gradient.addColorStop(0, debuffBodyGradientOverride.c1);
                        gradient.addColorStop(1, debuffBodyGradientOverride.c2);
                    } else {
                        gradient.addColorStop(0, bGlow);
                        gradient.addColorStop(1, bColor);
                    }
                }
                
                ctx.fillStyle = gradient;
                
                // V18b: 蛇身改为圆角方块（格子化）
                if (index === 0) {
                    switch (hShape) {
                        case 'triangle':
                            ctx.beginPath();
                            ctx.moveTo(
                                x + direction.x * size * 1.2 - direction.y * size * 0.1,
                                y + direction.y * size * 1.2 + direction.x * size * 0.1
                            );
                            ctx.lineTo(x - direction.y * size * 0.9, y + direction.x * size * 0.9);
                            ctx.lineTo(x + direction.y * size * 0.9, y - direction.x * size * 0.9);
                            ctx.closePath();
                            ctx.fill();
                            break;
                        case 'hexagon':
                            ctx.beginPath();
                            for (let i = 0; i < 6; i++) {
                                const angle = (i * Math.PI / 3) - Math.PI / 6;
                                const px = x + Math.cos(angle) * size;
                                const py = y + Math.sin(angle) * size;
                                if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                            }
                            ctx.closePath();
                            ctx.fill();
                            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                            ctx.lineWidth = 1;
                            ctx.beginPath();
                            ctx.moveTo(x - size * 0.5, y);
                            ctx.lineTo(x + size * 0.5, y);
                            ctx.stroke();
                            break;
                        case 'slim':
                            ctx.beginPath();
                            const rx = direction.x !== 0 ? size * 1.3 : size * 0.7;
                            const ry = direction.y !== 0 ? size * 1.3 : size * 0.7;
                            ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
                            ctx.fill();
                            break;
                        default:
                            ctx.beginPath();
                            ctx.arc(x, y, size, 0, Math.PI * 2);
                            ctx.fill();
                    }
                } else {
                    const bSize = cellSize * 0.82; // 占格子80%
                    const bRadius = cellSize * 0.15;
                    ctx.beginPath();
                    ctx.roundRect(x - bSize/2, y - bSize/2, bSize, bSize, bRadius);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
                
                // V17: 地形变色叠加
                if (terrainTint && index <= 3) {
                    ctx.fillStyle = terrainTint;
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 眼睛
                if (index === 0) {
                    ctx.fillStyle = 'white';
                    const eyeSize = Math.max(2, cellSize * 0.12);
                    const eyeOffset = Math.max(2, cellSize * 0.20);
                    
                    if (direction.x !== 0) {
                        ctx.beginPath();
                        ctx.arc(x + direction.x * eyeOffset, y - cellSize * 0.15, eyeSize, 0, Math.PI * 2);
                        ctx.arc(x + direction.x * eyeOffset, y + cellSize * 0.15, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction.y !== 0) {
                        ctx.beginPath();
                        ctx.arc(x - cellSize * 0.15, y + direction.y * eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(x + cellSize * 0.15, y + direction.y * eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        if (startIndicator) {
                            const dx = startIndicator.x - seg.x;
                            ctx.beginPath();
                            ctx.arc(x + Math.sign(dx) * eyeOffset, y - cellSize * 0.15, eyeSize, 0, Math.PI * 2);
                            ctx.arc(x + Math.sign(dx) * eyeOffset, y + cellSize * 0.15, eyeSize, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }
            });
            
            // V17: 呼吸灯用模块颜色
            const breathColor = isSpeedBoosted 
                ? `rgba(52, 152, 219, ${breathIntensity})` 
                : `rgba(${parseInt(hColor.slice(1,3),16)}, ${parseInt(hColor.slice(3,5),16)}, ${parseInt(hColor.slice(5,7),16)}, ${breathIntensity})`;
            breathEl.style.background = breathColor;
            breathEl.style.boxShadow = `0 0 ${10 * breathIntensity}px ${breathColor}`;
        }

        // ========== 新手引导绘制函数 ==========
        let lastTutorialUpdate = Date.now();

        function draw() {
            const time = Date.now() / 1000;
            if (showTutorial && tutorialTimer > 0) {
                const now = Date.now();
                const elapsed = (now - lastTutorialUpdate) / 1000;
                lastTutorialUpdate = now;
                tutorialTimer -= elapsed;
                if (tutorialTimer <= 0) {
                    showTutorial = false;
                }
            }
            
            const saturation = backgroundHue < 60 ? 70 : 50;
            const lightness = backgroundHue < 60 ? 32 : 22;
            ctx.fillStyle = `hsl(${backgroundHue}, ${saturation}%, ${lightness}%)`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (flashAlpha > 0) {
                ctx.fillStyle = flashColor + flashAlpha + ')';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                flashAlpha -= 0.03;
            }
            ctx.strokeStyle = `hsla(${backgroundHue}, 25%, 40%, 0.25)`;
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cellSize, 0);
                ctx.lineTo(i * cellSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * cellSize);
                ctx.lineTo(canvas.width, i * cellSize);
                ctx.stroke();
            }
            const center = Math.floor(tileCount / 2);
            const halfWidth = Math.floor(portalWidth / 2);
            const portalStart = center - halfWidth;
            const portalEnd = center + halfWidth + (portalWidth % 2 === 0 ? -1 : 0);
            const portals = {
                top: { start: portalStart, end: portalEnd },
                bottom: { start: portalStart, end: portalEnd },
                left: { start: portalStart, end: portalEnd },
                right: { start: portalStart, end: portalEnd }
            };
            const portalPulse = Math.sin(time * 2) * 0.3 + 0.7;
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 10;
            ctx.fillStyle = `rgba(0, 255, 136, ${0.2 * portalPulse})`;
            ctx.fillRect(portals.top.start * cellSize, 0, (portals.top.end - portals.top.start + 1) * cellSize, cellSize);
            ctx.fillRect(portals.bottom.start * cellSize, canvas.height - cellSize, (portals.bottom.end - portals.bottom.start + 1) * cellSize, cellSize);
            ctx.fillRect(0, portals.left.start * cellSize, cellSize, (portals.left.end - portals.left.start + 1) * cellSize);
            ctx.fillRect(canvas.width - cellSize, portals.right.start * cellSize, cellSize, (portals.right.end - portals.right.start + 1) * cellSize);
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff';
            ctx.font = `bold ${cellSize * 0.6}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const topCenterX = (portals.top.start + (portals.top.end - portals.top.start) / 2 + 0.5) * cellSize;
            ctx.fillText('↔', topCenterX, cellSize / 2);
            const bottomCenterX = (portals.bottom.start + (portals.bottom.end - portals.bottom.start) / 2 + 0.5) * cellSize;
            ctx.fillText('↔', bottomCenterX, canvas.height - cellSize / 2);
            const leftCenterY = (portals.left.start + (portals.left.end - portals.left.start) / 2 + 0.5) * cellSize;
            ctx.save();
            ctx.translate(cellSize / 2, leftCenterY);
            ctx.rotate(Math.PI / 2);
            ctx.fillText('↔', 0, 0);
            ctx.restore();
            const rightCenterY = (portals.right.start + (portals.right.end - portals.right.start) / 2 + 0.5) * cellSize;
            ctx.save();
            ctx.translate(canvas.width - cellSize / 2, rightCenterY);
            ctx.rotate(Math.PI / 2);
            ctx.fillText('↔', 0, 0);
            ctx.restore();
            const wallColor = '#ff4444';
            const wallWidth = Math.max(3, cellSize * 0.25);
            ctx.strokeStyle = wallColor;
            ctx.lineWidth = wallWidth;
            ctx.lineCap = 'round';
            ctx.shadowColor = wallColor;
            ctx.shadowBlur = 3;
            ctx.beginPath();
            ctx.moveTo(0, wallWidth / 2);
            ctx.lineTo(portals.top.start * cellSize, wallWidth / 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo((portals.top.end + 1) * cellSize, wallWidth / 2);
            ctx.lineTo(canvas.width, wallWidth / 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - wallWidth / 2);
            ctx.lineTo(portals.bottom.start * cellSize, canvas.height - wallWidth / 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo((portals.bottom.end + 1) * cellSize, canvas.height - wallWidth / 2);
            ctx.lineTo(canvas.width, canvas.height - wallWidth / 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(wallWidth / 2, 0);
            ctx.lineTo(wallWidth / 2, portals.left.start * cellSize);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(wallWidth / 2, (portals.left.end + 1) * cellSize);
            ctx.lineTo(wallWidth / 2, canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(canvas.width - wallWidth / 2, 0);
            ctx.lineTo(canvas.width - wallWidth / 2, portals.right.start * cellSize);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(canvas.width - wallWidth / 2, (portals.right.end + 1) * cellSize);
            ctx.lineTo(canvas.width - wallWidth / 2, canvas.height);
            ctx.stroke();
            ctx.shadowBlur = 0;
            const obstacleScale = getScaleFactors();
            const rockTexture = TEXTURE_IMAGES.obstacle_rock;
            const useRockTexture = !!(rockTexture && rockTexture.complete && rockTexture.naturalWidth > 0);
            const obstacleStyle = VISUAL_STYLE_CONFIG.obstacleRock || {};
            obstacles.forEach(obs => {
                const x = obs.x * cellSize + cellSize / 2;
                const y = obs.y * cellSize + cellSize / 2;
                const size = obstacleScale.obstacle;
                const pulse = Math.sin(time * 2 + obs.x * 0.7 + obs.y * 0.5) * 0.08 + 0.92;

                if (useRockTexture) {
                    const drawSize = cellSize * 0.96;
                    ctx.save();
                    ctx.globalAlpha = 0.95;
                    ctx.shadowColor = obstacleStyle.shadow || 'rgba(40, 48, 56, 0.45)';
                    ctx.shadowBlur = 5;
                    ctx.drawImage(rockTexture, x - drawSize / 2, y - drawSize / 2, drawSize, drawSize);
                    ctx.restore();
                } else {
                    ctx.shadowColor = obstacleStyle.shadow || 'rgba(40, 48, 56, 0.45)';
                    ctx.shadowBlur = 5;
                    ctx.fillStyle = obstacleStyle.fill || '#5d6d7e';
                    ctx.beginPath();
                    ctx.moveTo(x, y - size * pulse);
                    ctx.lineTo(x + size * 0.9 * pulse, y - size * 0.45 * pulse);
                    ctx.lineTo(x + size * 0.95 * pulse, y + size * 0.35 * pulse);
                    ctx.lineTo(x, y + size * pulse);
                    ctx.lineTo(x - size * 0.95 * pulse, y + size * 0.35 * pulse);
                    ctx.lineTo(x - size * 0.9 * pulse, y - size * 0.45 * pulse);
                    ctx.closePath();
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    ctx.strokeStyle = obstacleStyle.highlightStroke || 'rgba(223, 230, 233, 0.4)';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(x - size * 0.35, y - size * 0.18);
                    ctx.lineTo(x + size * 0.22, y - size * 0.42);
                    ctx.lineTo(x + size * 0.45, y - size * 0.08);
                    ctx.stroke();
                }

                ctx.fillStyle = obstacleStyle.symbolColor || '#c0392b';
                ctx.font = `bold ${obstacleScale.symbol * 0.72}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(obstacleStyle.symbol || '!', x, y + 1);
            });
            terrainZones.forEach(zone => {
                const pulse = Math.sin(time * 2) * 0.1 + 0.25;
                const isPosion = zone.type === 'poison';
                const zoneIconKey = isPosion ? 'terrain_poison' : 'terrain_ice';
                const zoneIcon = ICON_IMAGES[zoneIconKey];
                const useZoneIcon = !!(zoneIcon && zoneIcon.complete && zoneIcon.naturalWidth > 0);
                const terrainStyle = isPosion
                    ? (VISUAL_STYLE_CONFIG?.terrain?.poison || {})
                    : (VISUAL_STYLE_CONFIG?.terrain?.slow || {});

                zone.cells.forEach((cell, ci) => {
                    const px = cell.x * cellSize;
                    const py = cell.y * cellSize;
                    ctx.fillStyle = `rgba(${terrainStyle.baseFillRgb || (isPosion ? '100, 20, 120' : '20, 80, 160')}, ${pulse})`;
                    ctx.fillRect(px, py, cellSize, cellSize);

                    if (useZoneIcon) {
                        ctx.save();
                        ctx.globalAlpha = isPosion ? 0.26 : 0.28;
                        ctx.drawImage(zoneIcon, px + cellSize * 0.08, py + cellSize * 0.08, cellSize * 0.84, cellSize * 0.84);
                        ctx.restore();
                    }

                    for (let p = 0; p < 2; p++) {
                        const px2 = px + cellSize * (0.2 + 0.6 * Math.sin(time * 1.5 + ci * 2 + p * 3));
                        const py2 = py + cellSize * (0.3 + 0.4 * Math.cos(time * 1.2 + ci + p * 5));
                        const pSize = cellSize * 0.08 * (Math.sin(time * 3 + p) * 0.5 + 1);
                        const particleAlpha = isPosion
                            ? 0.4 + Math.sin(time * 2 + p) * 0.2
                            : 0.35 + Math.sin(time * 2 + p) * 0.15;
                        ctx.fillStyle = `rgba(${terrainStyle.particleRgb || (isPosion ? '180, 80, 220' : '100, 180, 255')}, ${particleAlpha})`;
                        ctx.beginPath();
                        ctx.arc(px2, py2, pSize, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });

                const bPulse = Math.sin(time * 3) * 0.2 + 0.5;
                ctx.strokeStyle = `rgba(${terrainStyle.borderRgb || (isPosion ? '180, 50, 180' : '80, 160, 255')}, ${bPulse})`;
                ctx.lineWidth = 2;
                ctx.strokeRect(
                    (zone.centerX - 1) * cellSize,
                    (zone.centerY - 1) * cellSize,
                    cellSize * 3,
                    cellSize * 3
                );

                const cx = zone.centerX * cellSize + cellSize / 2;
                const cy = zone.centerY * cellSize + cellSize / 2;
                if (useZoneIcon) {
                    const centerSize = cellSize * 1.18;
                    ctx.save();
                    ctx.globalAlpha = 0.92;
                    ctx.shadowColor = terrainStyle.centerGlow || (isPosion ? 'rgba(196, 84, 255, 0.55)' : 'rgba(136, 211, 255, 0.55)');
                    ctx.shadowBlur = 14;
                    ctx.drawImage(zoneIcon, cx - centerSize / 2, cy - centerSize / 2, centerSize, centerSize);
                    ctx.restore();
                } else {
                    ctx.fillStyle = `rgba(255, 255, 255, ${0.5 + Math.sin(time * 2) * 0.2})`;
                    ctx.font = `${cellSize * 0.8}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(isPosion ? '☠' : '❄', cx, cy);
                }
            });
            portalPairs.forEach(pair => {
                const pulse = Math.sin(time * 3 + pair.hue) * 0.3 + 0.7;
                const color = `hsl(${pair.hue}, 80%, 65%)`;
                const glowColor = `hsla(${pair.hue}, 90%, 70%, ${pulse * 0.5})`;

                [pair.a, pair.b].forEach((p, index) => {
                    const px = p.x * cellSize + cellSize / 2;
                    const py = p.y * cellSize + cellSize / 2;
                    const r = cellSize * 0.45;
                    const portalImg = index === 0 ? ICON_IMAGES.portal_a : ICON_IMAGES.portal_b;
                    ctx.shadowColor = color;
                    ctx.shadowBlur = 12 * pulse;
                    if (portalImg && portalImg.complete && portalImg.naturalWidth > 0) {
                        const size = cellSize * 1.15;
                        ctx.globalAlpha = 0.9 + pulse * 0.1;
                        ctx.drawImage(portalImg, px - size / 2, py - size / 2, size, size);
                        ctx.globalAlpha = 1;
                    } else {
                        ctx.strokeStyle = color;
                        ctx.lineWidth = 3;
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(px, py, r, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.fillStyle = glowColor;
                        ctx.beginPath();
                        ctx.arc(px, py, r * 0.6, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(px, py, 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.shadowBlur = 0;
                });

                const ax = pair.a.x * cellSize + cellSize / 2;
                const ay = pair.a.y * cellSize + cellSize / 2;
                const bx = pair.b.x * cellSize + cellSize / 2;
                const by = pair.b.y * cellSize + cellSize / 2;
                ctx.strokeStyle = `hsla(${pair.hue}, 60%, 50%, 0.15)`;
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 6]);
                ctx.beginPath();
                ctx.moveTo(ax, ay);
                ctx.lineTo(bx, by);
                ctx.stroke();
                ctx.setLineDash([]);
            });
            if (ceremonyKey && isCeremonyKeyState()) {
                const kx = ceremonyKey.x * cellSize + cellSize / 2;
                const ky = ceremonyKey.y * cellSize + cellSize / 2;
                const kSize = cellSize * 1.2;
                const kImg = ICON_IMAGES.ceremony_key;
                ctx.save();
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 20;
                if (kImg && kImg.complete && kImg.naturalWidth > 0) {
                    ctx.drawImage(kImg, kx - kSize / 2, ky - kSize / 2, kSize, kSize);
                } else {
                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath();
                    ctx.arc(kx, ky, kSize * 0.35, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
                ctx.restore();
            }

            if (ceremonyChest && isCeremonyChestState()) {
                const cx = ceremonyChest.x * cellSize + cellSize / 2;
                const cy = ceremonyChest.y * cellSize + cellSize / 2;
                const cSize = cellSize * 1.2;
                const cImg = ICON_IMAGES.ceremony_chest;
                ctx.save();
                ctx.shadowColor = '#ff8c00';
                ctx.shadowBlur = 22;
                if (cImg && cImg.complete && cImg.naturalWidth > 0) {
                    ctx.drawImage(cImg, cx - cSize / 2, cy - cSize / 2, cSize, cSize);
                } else {
                    ctx.fillStyle = '#8B4513';
                    ctx.beginPath();
                    ctx.roundRect(cx - cSize * 0.4, cy - cSize * 0.3, cSize * 0.8, cSize * 0.6, 3);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
                ctx.restore();
            }

            if (isCeremonyLootBurstState()) {
                const coinImg = ICON_IMAGES.loot_coin;
                lootFoods.forEach(lf => {
                    if (lf.eaten) return;
                    const fx = lf.x * cellSize + cellSize / 2;
                    const fy = lf.y * cellSize + cellSize / 2;
                    const fSize = cellSize * 0.85;
                    ctx.save();
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 10;
                    if (coinImg && coinImg.complete && coinImg.naturalWidth > 0) {
                        ctx.drawImage(coinImg, fx - fSize / 2, fy - fSize / 2, fSize, fSize);
                    } else {
                        ctx.fillStyle = '#ffd700';
                        ctx.beginPath();
                        ctx.arc(fx, fy, fSize * 0.35, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.shadowBlur = 0;
                    ctx.restore();
                });
            }
            const skinInset = 0;
            const skinTileRadius = Math.max(3, currentLevelConfig.skin.tileRadius);
            const skinTexture = TEXTURE_IMAGES.snake_skin;
            const useSkinTexture = !!(skinTexture && skinTexture.complete && skinTexture.naturalWidth > 0);
            const skinStyle = VISUAL_STYLE_CONFIG.snakeSkin || {};
            snakeSkins.forEach(skin => {
                if (!skin.cells || skin.cells.length === 0) return;
                const emberPulse = Math.sin(time * 2.4 + skin.spawnTime * 0.002) * 0.08 + 0.22;
                skin.cells.forEach((cell, index) => {
                    const px = cell.x * cellSize + skinInset;
                    const py = cell.y * cellSize + skinInset;
                    const tileSize = cellSize - skinInset * 2;
                    if (useSkinTexture) {
                        ctx.save();
                        ctx.globalAlpha = 0.94;
                        ctx.shadowColor = skinStyle.shadow || 'rgba(200, 140, 60, 0.6)';
                        ctx.shadowBlur = 10;
                        ctx.drawImage(skinTexture, px, py, tileSize, tileSize);
                        ctx.restore();
                    } else {
                        const gradient = ctx.createLinearGradient(px, py, px + tileSize, py + tileSize);
                        const stops = skinStyle.gradientStops || [
                            { offset: 0, color: '#8b5e3c' },
                            { offset: 0.52, color: '#a5714a' },
                            { offset: 1, color: '#6b3a1f' }
                        ];
                        stops.forEach((stop) => gradient.addColorStop(stop.offset, stop.color));
                        ctx.shadowColor = skinStyle.shadow || 'rgba(200, 140, 60, 0.6)';
                        ctx.shadowBlur = 10;
                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.roundRect(px, py, tileSize, tileSize, skinTileRadius);
                        ctx.fill();
                        ctx.strokeStyle = skinStyle.outerBorder || 'rgba(255, 200, 100, 0.5)';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.roundRect(px, py, tileSize, tileSize, skinTileRadius);
                        ctx.stroke();
                        ctx.shadowBlur = 0;
                        ctx.strokeStyle = skinStyle.innerBorder || 'rgba(234, 186, 120, 0.28)';
                        ctx.lineWidth = 1.2;
                        ctx.beginPath();
                        ctx.roundRect(px + 0.5, py + 0.5, tileSize - 1, tileSize - 1, skinTileRadius - 1);
                        ctx.stroke();
                        ctx.fillStyle = skinStyle.bandFill || 'rgba(33, 15, 6, 0.18)';
                        ctx.beginPath();
                        ctx.roundRect(px + tileSize * 0.12, py + tileSize * 0.1, tileSize * 0.76, tileSize * 0.24, 4);
                        ctx.fill();
                        ctx.strokeStyle = `rgba(${skinStyle.emberStrokeRgb || '255, 184, 92'}, ${emberPulse})`;
                        ctx.lineWidth = 1.4;
                        ctx.beginPath();
                        ctx.moveTo(px + tileSize * 0.18, py + tileSize * 0.72);
                        ctx.lineTo(px + tileSize * 0.42, py + tileSize * 0.52);
                        ctx.lineTo(px + tileSize * 0.58, py + tileSize * 0.67);
                        ctx.lineTo(px + tileSize * 0.82, py + tileSize * 0.38);
                        ctx.stroke();
                        ctx.strokeStyle = skinStyle.ridgeStroke || 'rgba(24, 10, 4, 0.30)';
                        ctx.lineWidth = 1;
                        for (let ridge = 0; ridge < 3; ridge++) {
                            const ridgeOffset = ridge * tileSize * 0.2;
                            ctx.beginPath();
                            ctx.moveTo(px + tileSize * 0.14, py + tileSize * 0.24 + ridgeOffset);
                            ctx.lineTo(px + tileSize * 0.46, py + tileSize * 0.12 + ridgeOffset);
                            ctx.lineTo(px + tileSize * 0.82, py + tileSize * 0.2 + ridgeOffset);
                            ctx.stroke();
                        }
                        if (index % 2 === 0) {
                            ctx.fillStyle = skinStyle.sparkle || 'rgba(255, 214, 168, 0.08)';
                            ctx.beginPath();
                            ctx.arc(px + tileSize * 0.28, py + tileSize * 0.3, tileSize * 0.14, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                });
            });
            
            if (isInWaitingTutorialState()) {
                if (showTutorial) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#fff';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2;
                    ctx.font = 'bold 22px Arial';
                    ctx.fillText(UI_TEXT.tutorial.title, centerX, centerY - 90);
                    ctx.font = 'bold 18px Arial';
                    ctx.fillStyle = '#2ecc71';
                    ctx.fillText(UI_TEXT.tutorial.line1, centerX, centerY - 50);
                    ctx.fillStyle = '#e74c3c';
                    ctx.fillText(UI_TEXT.tutorial.line2, centerX, centerY - 10);
                    ctx.fillStyle = '#9b59b6';
                    ctx.fillText(UI_TEXT.tutorial.line3, centerX, centerY + 20);
                    ctx.fillStyle = '#d2691e';
                    ctx.fillText(UI_TEXT.tutorial.line4, centerX, centerY + 60);
                    ctx.fillStyle = '#800080';
                    ctx.fillText(UI_TEXT.tutorial.line5, centerX, centerY + 90);
                    ctx.fillStyle = '#00ff88';
                    ctx.fillText(UI_TEXT.wave.canvasTip, centerX, centerY + 120);
                    ctx.fillStyle = '#aaa';
                    ctx.font = '14px Arial';
                    const closeText = tutorialTimer > 0
                        ? `点击关闭 (${Math.ceil(tutorialTimer)}秒后自动消失)`
                        : '点击关闭';
                    ctx.fillText(closeText, centerX, centerY + 140);
                }
                return;
            }
            
            if (getPrimaryGameState() === 'WAITING') {
                drawSnake(time);
                if (startIndicator) {
                    const scale = getScaleFactors();
                    const bounce = Math.sin(time * 4) * 4;
                    const x = startIndicator.x * cellSize + cellSize / 2;
                    const y = startIndicator.y * cellSize + cellSize / 2 + bounce;
                    const size = scale.snakeHead;
                    ctx.shadowColor = '#27ae60';
                    ctx.shadowBlur = 15;
                    ctx.fillStyle = '#2ecc71';
                    ctx.beginPath();
                    ctx.roundRect(x - size, y - size, size * 2, size * 2, 4);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    ctx.font = `bold ${scale.symbol}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('▶', x, y);
                }
            } else if (isGameRunning) {
                foods.forEach(food => {
                    const scale = getScaleFactors();
                    let x = food.x * cellSize + cellSize / 2;
                    let y = food.y * cellSize + cellSize / 2;

                    if (food.type.isDanger && !food.type.isWind) {
                        const shakeAmount = Math.sin(time * 15 + (food.dangerShakePhase || 0)) * 2;
                        x += shakeAmount;
                        y += shakeAmount * 0.5;
                    }

                    const windRotation = food.type.isWind ? (time * 3 + (food.windSpinPhase || 0)) : 0;
                    const pulse = Math.sin(time * 3 + food.pulsePhase) * 0.05 + 0.95;
                    const size = cellSize * 0.45 * pulse;
                    const markerRadius = cellSize * 0.48;
                    const markerFill = food.type.isDanger
                        ? 'rgba(94, 17, 17, 0.34)'
                        : food.type.isWind
                            ? 'rgba(20, 74, 89, 0.30)'
                            : 'rgba(36, 49, 24, 0.26)';
                    const markerStroke = food.type.isDanger
                        ? 'rgba(255, 196, 196, 0.68)'
                        : food.type.isWind
                            ? 'rgba(204, 244, 255, 0.68)'
                            : 'rgba(252, 245, 214, 0.62)';

                    const iconKey = SHAPE_TO_ICON[food.type.shape];
                    const iconImg = iconKey ? ICON_IMAGES[iconKey] : null;
                    const useIcon = iconImg && iconImg.complete && iconImg.naturalWidth > 0;

                    if (!useIcon) {
                        ctx.save();
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = markerFill;
                        ctx.beginPath();
                        ctx.arc(x, y, markerRadius, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = markerStroke;
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.arc(x, y, markerRadius + 1.5, 0, Math.PI * 2);
                        ctx.stroke();

                        if (selectedModule) {
                            const modScore = selectedModule.scoreModifiers[food.type.effect] || 0;
                            let auraColor;
                            if (modScore > 5) auraColor = 'rgba(46, 204, 113, 0.6)';
                            else if (modScore < -3) auraColor = 'rgba(231, 76, 60, 0.5)';
                            else auraColor = 'rgba(200, 200, 200, 0.25)';

                            const auraPulse = Math.sin(time * 4 + food.pulsePhase) * 0.3 + 0.7;
                            ctx.strokeStyle = auraColor;
                            ctx.lineWidth = 2.5;
                            ctx.shadowColor = auraColor;
                            ctx.shadowBlur = 8 * auraPulse;
                            ctx.beginPath();
                            ctx.arc(x, y, markerRadius + 4, 0, Math.PI * 2);
                            ctx.stroke();
                            ctx.shadowBlur = 0;
                        }
                        ctx.restore();
                    }

                    ctx.shadowColor = food.type.glow;
                    ctx.shadowBlur = useIcon ? 0 : 12;
                    ctx.fillStyle = food.type.color;

                    if (windRotation) {
                        ctx.save();
                        ctx.translate(x, y);
                        ctx.rotate(windRotation);
                        x = 0;
                        y = 0;
                    }

                    if (useIcon) {
                        const drawSize = cellSize * 0.9;
                        ctx.drawImage(iconImg, x - drawSize / 2, y - drawSize / 2, drawSize, drawSize);
                    } else {
                        switch (food.type.shape) {
                            case 'grow_orb':
                                ctx.beginPath();
                                ctx.moveTo(x, y - size * 0.9);
                                ctx.lineTo(x + size * 0.7, y + size * 0.2);
                                ctx.lineTo(x + size * 0.25, y + size * 0.2);
                                ctx.lineTo(x + size * 0.25, y + size * 0.8);
                                ctx.lineTo(x - size * 0.25, y + size * 0.8);
                                ctx.lineTo(x - size * 0.25, y + size * 0.2);
                                ctx.lineTo(x - size * 0.7, y + size * 0.2);
                                ctx.closePath();
                                ctx.fill();
                                ctx.strokeStyle = 'rgba(246, 255, 208, 0.95)';
                                ctx.lineWidth = 2;
                                ctx.stroke();
                                break;
                            case 'teleport_gate':
                                const ringOffset = size * 0.28;
                                const ringRadius = size * 0.34;
                                ctx.lineWidth = 2.6;
                                ctx.strokeStyle = 'rgba(255, 238, 179, 0.95)';
                                ctx.beginPath();
                                ctx.arc(x - ringOffset, y, ringRadius, 0, Math.PI * 2);
                                ctx.stroke();
                                ctx.beginPath();
                                ctx.arc(x + ringOffset, y, ringRadius, 0, Math.PI * 2);
                                ctx.stroke();
                                ctx.fillStyle = 'rgba(255, 209, 102, 0.98)';
                                ctx.beginPath();
                                ctx.arc(x - ringOffset, y, size * 0.11, 0, Math.PI * 2);
                                ctx.fill();
                                ctx.fillStyle = 'rgba(110, 231, 255, 0.98)';
                                ctx.beginPath();
                                ctx.arc(x + ringOffset, y, size * 0.11, 0, Math.PI * 2);
                                ctx.fill();
                                ctx.strokeStyle = 'rgba(255, 255, 255, 0.96)';
                                ctx.lineWidth = 2.2;
                                ctx.beginPath();
                                ctx.moveTo(x - size * 0.05, y - size * 0.18);
                                ctx.lineTo(x + size * 0.05, y - size * 0.18);
                                ctx.lineTo(x + size * 0.05, y - size * 0.28);
                                ctx.lineTo(x + size * 0.2, y - size * 0.1);
                                ctx.lineTo(x + size * 0.05, y + size * 0.08);
                                ctx.lineTo(x + size * 0.05, y - size * 0.02);
                                ctx.lineTo(x - size * 0.05, y - size * 0.02);
                                ctx.stroke();
                                ctx.beginPath();
                                ctx.moveTo(x + size * 0.05, y + size * 0.18);
                                ctx.lineTo(x - size * 0.05, y + size * 0.18);
                                ctx.lineTo(x - size * 0.05, y + size * 0.28);
                                ctx.lineTo(x - size * 0.2, y + size * 0.1);
                                ctx.lineTo(x - size * 0.05, y - size * 0.08);
                                ctx.lineTo(x - size * 0.05, y + size * 0.02);
                                ctx.lineTo(x + size * 0.05, y + size * 0.02);
                                ctx.stroke();
                                break;
                            case 'teleport_gate_legacy':
                                ctx.lineWidth = 2.4;
                                ctx.strokeStyle = 'rgba(255, 238, 179, 0.95)';
                                ctx.beginPath();
                                ctx.arc(x - size * 0.32, y, size * 0.44, -Math.PI * 0.2, Math.PI * 1.2);
                                ctx.stroke();
                                ctx.beginPath();
                                ctx.arc(x + size * 0.32, y, size * 0.44, Math.PI * 0.8, Math.PI * 2.2);
                                ctx.stroke();
                                ctx.fillStyle = 'rgba(255, 209, 102, 0.95)';
                                ctx.beginPath();
                                ctx.arc(x - size * 0.34, y, size * 0.15, 0, Math.PI * 2);
                                ctx.arc(x + size * 0.34, y, size * 0.15, 0, Math.PI * 2);
                                ctx.fill();
                                ctx.strokeStyle = 'rgba(255, 245, 214, 0.9)';
                                ctx.beginPath();
                                ctx.moveTo(x - size * 0.08, y - size * 0.23);
                                ctx.lineTo(x + size * 0.08, y);
                                ctx.lineTo(x - size * 0.08, y + size * 0.23);
                                ctx.stroke();
                                ctx.beginPath();
                                ctx.moveTo(x + size * 0.08, y - size * 0.23);
                                ctx.lineTo(x - size * 0.08, y);
                                ctx.lineTo(x + size * 0.08, y + size * 0.23);
                                ctx.stroke();
                                ctx.fillStyle = food.type.color;
                                break;
                            case 'barrier_core':
                                ctx.beginPath();
                                for (let i = 0; i < 6; i++) {
                                    const angle = (i * Math.PI / 3) - Math.PI / 6;
                                    const px = x + Math.cos(angle) * size * 0.92;
                                    const py = y + Math.sin(angle) * size * 0.92;
                                    if (i === 0) ctx.moveTo(px, py);
                                    else ctx.lineTo(px, py);
                                }
                                ctx.closePath();
                                ctx.fill();
                                ctx.strokeStyle = 'rgba(244, 214, 179, 0.95)';
                                ctx.lineWidth = 2;
                                ctx.stroke();
                                ctx.strokeStyle = 'rgba(78, 52, 46, 0.8)';
                                ctx.lineWidth = 2.2;
                                ctx.beginPath();
                                ctx.moveTo(x - size * 0.42, y - size * 0.1);
                                ctx.lineTo(x + size * 0.42, y - size * 0.1);
                                ctx.moveTo(x - size * 0.34, y + size * 0.2);
                                ctx.lineTo(x + size * 0.34, y + size * 0.2);
                                ctx.stroke();
                                break;
                            case 'shrink_rune':
                                ctx.beginPath();
                                ctx.arc(x, y, size * 0.70, 0, Math.PI * 2);
                                ctx.fill();
                                ctx.strokeStyle = 'rgba(255, 214, 214, 0.85)';
                                ctx.lineWidth = 2;
                                ctx.beginPath();
                                ctx.arc(x, y, size * 0.9, 0, Math.PI * 2);
                                ctx.stroke();
                                ctx.strokeStyle = 'rgba(120, 10, 18, 0.9)';
                                ctx.lineWidth = 2.2;
                                ctx.beginPath();
                                ctx.moveTo(x - size * 0.42, y);
                                ctx.lineTo(x - size * 0.08, y);
                                ctx.lineTo(x - size * 0.2, y - size * 0.14);
                                ctx.moveTo(x - size * 0.08, y);
                                ctx.lineTo(x - size * 0.2, y + size * 0.14);
                                ctx.moveTo(x + size * 0.42, y);
                                ctx.lineTo(x + size * 0.08, y);
                                ctx.lineTo(x + size * 0.2, y - size * 0.14);
                                ctx.moveTo(x + size * 0.08, y);
                                ctx.lineTo(x + size * 0.2, y + size * 0.14);
                                ctx.stroke();
                                break;
                            case 'circle':
                                ctx.beginPath();
                                ctx.arc(x, y, size, 0, Math.PI * 2);
                                ctx.fill();
                                break;
                            case 'danger_square':
                                ctx.beginPath();
                                ctx.moveTo(x, y + size * 0.9);
                                ctx.lineTo(x + size * 0.7, y - size * 0.2);
                                ctx.lineTo(x + size * 0.25, y - size * 0.2);
                                ctx.lineTo(x + size * 0.25, y - size * 0.8);
                                ctx.lineTo(x - size * 0.25, y - size * 0.8);
                                ctx.lineTo(x - size * 0.25, y - size * 0.2);
                                ctx.lineTo(x - size * 0.7, y - size * 0.2);
                                ctx.closePath();
                                ctx.fill();
                                ctx.strokeStyle = '#ff0000';
                                ctx.lineWidth = 2;
                                ctx.setLineDash([3, 3]);
                                ctx.stroke();
                                ctx.setLineDash([]);
                                break;
                            case 'triangle':
                                ctx.beginPath();
                                ctx.moveTo(x, y - size);
                                ctx.lineTo(x + size, y + size);
                                ctx.lineTo(x - size, y + size);
                                ctx.closePath();
                                ctx.fill();
                                break;
                            case 'diamond':
                                ctx.beginPath();
                                ctx.moveTo(x, y - size);
                                ctx.lineTo(x + size, y);
                                ctx.lineTo(x, y + size);
                                ctx.lineTo(x - size, y);
                                ctx.closePath();
                                ctx.fill();
                                break;
                            case 'wind_star':
                                ctx.beginPath();
                                for (let i = 0; i < 6; i++) {
                                    const angle1 = i * Math.PI / 3;
                                    const angle2 = i * Math.PI / 3 + Math.PI / 6;
                                    const outerRadius = size * 0.95;
                                    const innerRadius = size * 0.48;
                                    ctx.lineTo(Math.cos(angle1) * outerRadius, Math.sin(angle1) * outerRadius);
                                    ctx.lineTo(Math.cos(angle2) * innerRadius, Math.sin(angle2) * innerRadius);
                                }
                                ctx.closePath();
                                ctx.fill();
                                ctx.strokeStyle = 'rgba(166, 227, 255, 0.75)';
                                ctx.lineWidth = 2;
                                const ringSize = size * 1.18 + Math.sin(time * 5) * 3;
                                ctx.beginPath();
                                ctx.arc(0, 0, ringSize, 0, Math.PI * 2);
                                ctx.stroke();
                                break;
                            case 'barrier_sign':
                                ctx.beginPath();
                                ctx.moveTo(x, y - size * 0.9);
                                ctx.lineTo(x + size * 0.85, y + size * 0.7);
                                ctx.lineTo(x - size * 0.85, y + size * 0.7);
                                ctx.closePath();
                                ctx.fill();
                                ctx.strokeStyle = 'rgba(120, 60, 0, 0.6)';
                                ctx.lineWidth = 1.5;
                                ctx.beginPath();
                                ctx.moveTo(x - size * 0.4, y + size * 0.1);
                                ctx.lineTo(x + size * 0.4, y + size * 0.1);
                                ctx.moveTo(x - size * 0.3, y + size * 0.35);
                                ctx.lineTo(x + size * 0.3, y + size * 0.35);
                                ctx.stroke();
                                ctx.strokeStyle = 'rgba(255, 200, 50, 0.8)';
                                ctx.lineWidth = 2;
                                ctx.beginPath();
                                ctx.moveTo(x, y - size * 0.9);
                                ctx.lineTo(x + size * 0.85, y + size * 0.7);
                                ctx.lineTo(x - size * 0.85, y + size * 0.7);
                                ctx.closePath();
                                ctx.stroke();
                                break;
                            case 'hexagon':
                                ctx.beginPath();
                                for (let i = 0; i < 6; i++) {
                                    const angle = (i * Math.PI / 3) - Math.PI / 6;
                                    const px = x + Math.cos(angle) * size;
                                    const py = y + Math.sin(angle) * size;
                                    if (i === 0) ctx.moveTo(px, py);
                                    else ctx.lineTo(px, py);
                                }
                                ctx.closePath();
                                ctx.fill();
                                break;
                        }
                    }

                    if (windRotation) {
                        ctx.restore();
                    }

                    ctx.shadowBlur = 0;
                });
                drawSnake(time);
                if (teleportPreview) {
                    if (teleportTrailTimer <= 0) {
                        teleportPreview = null;
                    } else {
                        const previewTime = Date.now() / 1000;
                        const previewX = teleportPreview.x * cellSize + cellSize / 2;
                        const previewY = teleportPreview.y * cellSize + cellSize / 2;
                        const previewPulse = Math.sin(previewTime * 10) * 0.5 + 0.5;
                        ctx.fillStyle = `rgba(39, 174, 96, ${previewPulse})`;
                        ctx.beginPath();
                        ctx.arc(previewX, previewY, cellSize * 0.6, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.shadowColor = '#27ae60';
                        ctx.shadowBlur = 15;
                        ctx.strokeStyle = `rgba(46, 204, 113, ${previewPulse})`;
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(previewX, previewY, cellSize * 0.6, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.shadowBlur = 0;

                        if (teleportTrailTimer > 0) {
                            const headX = snake[0].x * cellSize + cellSize / 2;
                            const headY = snake[0].y * cellSize + cellSize / 2;
                            ctx.strokeStyle = '#2ecc71';
                            ctx.lineWidth = 2;
                            ctx.setLineDash([5, 5]);
                            ctx.beginPath();
                            ctx.moveTo(headX, headY);
                            ctx.lineTo(previewX, previewY);
                            ctx.stroke();
                            ctx.setLineDash([]);
                            teleportTrailTimer -= 16;
                        }
                    }
                }
                floatingTexts = floatingTexts.filter(ft => ft.age < ft.maxAge);
                floatingTexts.forEach(ft => {
                    ft.age += 1 / 60;
                    const progress = ft.age / ft.maxAge;
                    const alpha = 1 - progress;
                    const yOffset = -30 * progress;
                    const fontSize = ft.big ? cellSize * 1.0 : cellSize * 0.75;

                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = ft.color;
                    ctx.font = `bold ${Math.round(fontSize)}px "Courier New", monospace`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    ctx.strokeStyle = 'rgba(0,0,0,0.7)';
                    ctx.lineWidth = 3;
                    ctx.strokeText(ft.text, ft.x, ft.y + yOffset);
                    ctx.fillText(ft.text, ft.x, ft.y + yOffset);

                    if (ft.big && progress < 0.4) {
                        const sparkAlpha = (0.4 - progress) * 2;
                        ctx.fillStyle = `rgba(255, 255, 200, ${sparkAlpha})`;
                        for (let i = 0; i < 3; i++) {
                            const angle = (i / 3) * Math.PI * 2 + ft.age * 10;
                            const dist = 8 + progress * 20;
                            ctx.beginPath();
                            ctx.arc(ft.x + Math.cos(angle) * dist, ft.y + yOffset + Math.sin(angle) * dist, 2, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                    ctx.restore();
                });
            }
        }

        function animStep() {
            draw();
            requestAnimationFrame(animStep);
        }

        function gameOver(reason) {
            resetRunState();
            isGameOver = true;
            syncPauseButtonVisibility();
            flashEffect('death');
            flashAlpha = 0.9;
            backgroundHue = 0;
            showOnlyResultOverlay();
            resultIcon.textContent = UI_TEXT.icon.death;
            resultText.textContent = currentWave > bestWave - 1 ? UI_TEXT.result.newRecord : UI_TEXT.result.gameOver;
            resultText.style.color = '#e74c3c';
            {
                const surviveMin = Math.floor(totalSurvivalTime / 60).toString().padStart(2, '0');
                const surviveSec = Math.floor(totalSurvivalTime % 60).toString().padStart(2, '0');
                const moduleName = selectedModule ? `${selectedModule.icon}${selectedModule.name}` : '';
                resultScore.textContent = UI_TEXT.hud.resultSummary(currentWave, score, `${surviveMin}:${surviveSec}`, moduleName);
            }
        }

        function startGame() {
            if (getPrimaryGameState() === 'RUNNING' || !hasSelectedMode) return;
            
            resizeCanvas();
            stopGameLoop();
            const centerX = Math.floor(tileCount / 2);
            const centerY = Math.floor(tileCount / 2);
            snake = [
                { x: centerX, y: centerY },
                { x: centerX - 1, y: centerY },
                { x: centerX - 2, y: centerY }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };

            startIndicator = null;
            foods = [];
            obstacles = [];
            snakeSkins = [];
            foodEatenCount = 0;
            score = 0;
            currentInterval = BASE_SPEED;
            backgroundHue = 240;
            speedBoostTimer = 0;
            isSpeedBoosted = false;
            dashBurstTicks = 0;
            isLevelComplete = false;
            isGameOver = false;

            teleportInvincibleSteps = 0;
            portalTeleportCooldown = 0;

            teleportPreview = null;
            teleportTrailTimer = 0;
            headGlowTimer = 0;

            remainingTime = Infinity;
            gameStartTime = Date.now();
            waveStartTime = Date.now();
            currentWave = 1;
            clearWaveTransitionState();
            terrainZones = [];
            if (selectedModule && selectedModule.special === 'widePortal') {
                portalWidth = 5;
            } else {
                portalWidth = currentLevelConfig.portalWidth;
            }

                            const y = centerY + dy;

                        }

                            centerX,
                            centerY,
                            cells,
                            spawnTime: Date.now()

                        console.log('[蛇皮V14] 生成3x3区域于:', centerX, centerY, '格子数:', cells.length, '总计区域:', snakeSkins.length);

                        return;

                    for (let i = 0; i < canSpawnCount; i++) {

                    }
                    flashEffect('barrier');
                    if (obstacles.length > MAX_OBSTACLES) {
                        obstacles = obstacles.slice(-MAX_OBSTACLES);
                    }
                }
            };
        }

        currentMode = 'survival';
        activeModeConfig = MODE_CONFIGS.survival;
        currentModeRules = { timeLimit: Infinity, targetScore: null };
        remainingTime = Infinity;
        moduleButtonsContainer.innerHTML = '';
        Object.values(MODULE_TYPES).forEach(mod => {
            const btn = document.createElement('button');
            btn.className = 'mode-btn';
            btn.type = 'button';
            btn.innerHTML = `
                <div class="mode-btn-title">
                    <span>${mod.icon} ${mod.name}</span>
                    <span class="mode-lock" style="color:#aaa;font-size:12px">${mod.strength}</span>
                </div>
                <div class="mode-btn-desc">${mod.desc}<br><span style="color:#e74c3c">${mod.weakness}</span> · <span style="color:#2ecc71">${mod.passive}</span></div>
            `;
            btn.addEventListener('click', () => {
                selectedModule = mod;
                const legendEl = document.getElementById('moduleLegend');
                if (legendEl) {
                    legendEl.innerHTML = `<span class="legend-symbol">${selectedModule.icon}</span> <span>${selectedModule.name}</span>`;
                }
                hideResult();
                stopGameLoop();
                currentMode = 'survival';
                activeModeConfig = MODE_CONFIGS.survival;
                currentModeRules = { timeLimit: Infinity, targetScore: null };
                remainingTime = Infinity;
                resetToWaitingState();
                hasSelectedMode = true;
                uiOverlaysModule.hideModeOverlay();
            });
            moduleButtonsContainer.appendChild(btn);
        });
        initWaitingState();
        updateTouchHint();
        showModeOverlay();
        animStep();
    </script>
</body>
</html>
