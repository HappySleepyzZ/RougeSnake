<!DOCTYPE html>
<!-- Redeploy marker: 2026-04-14 V23.0 -->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="description" content="支持手机和微信 H5 游玩的贪吃蛇小游戏 - 肉鸽生存版 V19">
    <meta property="og:title" content="Snake V23 - Wave Shop">
    <meta property="og:description" content="波间商店、钥匙宝箱仪式、蛇身代币">
    <title>Snake V23 - Wave Shop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            padding:
                max(12px, env(safe-area-inset-top))
                max(12px, env(safe-area-inset-right))
                max(12px, env(safe-area-inset-bottom))
                max(12px, env(safe-area-inset-left));
        }

        #gameCanvas {
            display: block;
            border-radius: 20px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
        }

        /* 状态面板 - 左上角 */
        .status-panel {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 18px;
            border-radius: 12px;
            z-index: 10;
            color: #fff;
            font-size: 14px;
            line-height: 1.6;
            backdrop-filter: blur(8px);
        }

        .status-panel .timer {
            font-size: 20px;
            font-weight: bold;
            color: #2ecc71;
        }

        .status-panel .timer.warning {
            color: #f1c40f;
        }

        .status-panel .timer.critical {
            color: #e74c3c;
        }

        .status-panel .score-line {
            margin-top: 8px;
            font-size: 13px;
        }

        .status-panel .target {
            color: #f1c40f;
        }

        /* V19c: 食物图例 - 可收起 */
        .legend {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            z-index: 10;
            transition: all 0.3s ease;
        }
        .legend.collapsed {
            padding: 6px 10px;
            cursor: pointer;
        }
        .legend.collapsed .legend-body { display: none; }
        .legend.collapsed .legend-toggle-label { display: inline; }
        .legend.expanded {
            padding: 10px 15px;
        }
        .legend.expanded .legend-body { display: block; line-height: 1.8; }
        .legend.expanded .legend-toggle-label { display: none; }
        .legend-toggle {
            display: flex; align-items: center; gap: 4px;
            cursor: pointer; font-size: 12px; color: #aaa;
            user-select: none; -webkit-user-select: none;
            margin-bottom: 2px;
        }
        .legend-toggle-label { font-size: 11px; }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #fff;
        }
        
        .legend-symbol {
            font-size: 16px;
            font-weight: bold;
        }

        .legend-positive {
            color: #2ecc71;
        }

        .legend-strategy {
            color: #e6c07b;
        }

        .legend-danger {
            color: #e74c3c;
        }

        .legend-wind {
            color: #74cfff;
        }

        /* 过关/失败动画 */
        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .result-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .result-overlay .result-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounceIn 0.6s ease;
        }

        .result-overlay .result-text {
            font-size: 36px;
            color: #fff;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .result-overlay .result-score {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 30px;
        }

        .result-overlay .restart-btn {
            padding: 15px 40px;
            font-size: 18px;
            background: #2ecc71;
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .result-overlay .restart-btn:hover {
            transform: scale(1.05);
            background: #27ae60;
        }

        .mode-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(7, 10, 18, 0.88);
            z-index: 120;
            backdrop-filter: blur(12px);
        }

        .mode-overlay.hidden {
            display: none;
        }

        .mode-card {
            width: min(92vw, 420px);
            padding: 28px 22px;
            border-radius: 24px;
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 42%),
                linear-gradient(180deg, rgba(25, 34, 56, 0.96), rgba(9, 13, 24, 0.98));
            box-shadow: 0 22px 60px rgba(0, 0, 0, 0.45);
            color: #f7f9ff;
        }

        .mode-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 0.04em;
        }

        .mode-subtitle {
            margin-top: 10px;
            font-size: 14px;
            line-height: 1.6;
            color: rgba(233, 240, 255, 0.76);
        }

        .mode-actions {
            display: grid;
            gap: 12px;
            margin-top: 22px;
        }

        .mode-btn {
            width: 100%;
            padding: 16px 18px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            text-align: left;
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }

        .mode-btn:not([disabled]):hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.13);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .mode-btn[disabled] {
            opacity: 0.5;
        }

        .mode-btn-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: 700;
        }

        .mode-btn-desc {
            margin-top: 6px;
            font-size: 13px;
            line-height: 1.5;
            color: rgba(233, 240, 255, 0.72);
        }

        .mode-lock {
            font-size: 12px;
            color: #ffd166;
        }

        .mode-note {
            margin-top: 16px;
            font-size: 12px;
            line-height: 1.6;
            color: rgba(233, 240, 255, 0.58);
        }

        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* 呼吸灯效果 */
        .breath-indicator {
            position: fixed;
            top: 10px;
            right: 200px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #2ecc71;
            opacity: 0.8;
            z-index: 10;
        }

        .touch-hint {
            position: fixed;
            left: 50%;
            bottom: calc(126px + env(safe-area-inset-bottom));
            transform: translateX(-50%);
            padding: 10px 18px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.55);
            color: #f5f7ff;
            font-size: 14px;
            line-height: 1.4;
            z-index: 12;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        .touch-controls {
            position: fixed;
            left: 50%;
            bottom: calc(16px + env(safe-area-inset-bottom));
            transform: translateX(-50%);
            display: grid;
            grid-template-columns: repeat(3, 64px);
            grid-template-rows: repeat(2, 64px);
            gap: 10px;
            z-index: 12;
            user-select: none;
            -webkit-user-select: none;
        }

        .control-btn {
            border: 0;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
            touch-action: manipulation;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
        }

        .control-btn:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.22);
        }

        .control-up { grid-column: 2; grid-row: 1; }
        .control-left { grid-column: 1; grid-row: 2; }
        .control-down { grid-column: 2; grid-row: 2; }
        .control-right { grid-column: 3; grid-row: 2; }

        @media (hover: hover) and (pointer: fine) {
            .touch-controls, .touch-hint { display: none; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <!-- 状态面板 - 左上角 -->
    <div class="status-panel" id="statusPanel">
        <div class="timer" id="timerDisplay">02:30</div>
        <div class="score-line">
            <span id="scoreDisplay">分数: 0</span>
            <span class="target" id="targetDisplay">/ 目标: 240</span>
        </div>
    </div>
    
    <!-- V19c: 食物图例 - 默认折叠 -->
    <div class="legend collapsed" id="legend">
        <div class="legend-toggle"><span>📋</span><span class="legend-toggle-label">图例</span></div>
        <div class="legend-body">
            <div class="legend-item" id="moduleLegend" style="margin-bottom:4px;font-weight:bold"><span class="legend-symbol">⚪</span> <span>通用</span></div>
            <div class="legend-item legend-positive"><span class="legend-symbol" style="color:#9be15d">&#8593;</span> <span>变长</span></div>
            <div class="legend-item legend-positive"><span class="legend-symbol" style="color:#ffd166">&#8644;</span> <span>对调</span></div>
            <div class="legend-item legend-strategy"><span class="legend-symbol" style="color:#f59e0b">🚧</span> <span>造障</span></div>
            <div class="legend-item legend-danger"><span class="legend-symbol" style="color:#ff6b6b">&#8595;</span> <span>变短</span></div>
            <div class="legend-item legend-wind"><span class="legend-symbol" style="color:#74cfff">🌀</span> <span>清障</span></div>
            <div class="legend-item"><span class="legend-symbol" style="color:#8b4513">🐍</span> <span>蛇皮</span></div>
            <div class="legend-item"><span class="legend-symbol" style="color:#800080">☠</span> <span>毒雾</span></div>
            <div class="legend-item"><span class="legend-symbol" style="color:#0064c8">❄</span> <span>减速</span></div>
            <div class="legend-item"><span class="legend-symbol" style="color:#c084fc">⊙</span> <span>传送门</span></div>
        </div>
    </div>
    
    <!-- 过关/失败动画 -->
    <div class="result-overlay" id="resultOverlay">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-text" id="resultText"></div>
        <div class="result-score" id="resultScore"></div>
        <button class="restart-btn" id="restartBtn">重新开始</button>
    </div>

    <!-- V16: 波次过渡画面 -->
    <div class="result-overlay" id="waveOverlay">
        <div class="result-icon">🌊</div>
        <div class="result-text" id="waveText" style="color:#2ecc71">Wave 1 Complete!</div>
        <div class="result-score" id="waveCountdown">下一波 3...</div>
    </div>

    <div class="mode-overlay" id="modeOverlay">
        <div class="mode-card">
            <div class="mode-title">选择初始模块</div>
            <div class="mode-subtitle" id="modeSubtitle">每种模块对不同效果有独特加成，选择你的风格。</div>
            <div class="mode-actions" id="moduleButtons">
                <!-- V16: 动态生成 -->
            </div>
            <div class="mode-note">波次生存：每 30 秒一波，难度递增，存活越久越好。</div>
        </div>
    </div>
    
    <!-- V19: 波间商店 -->
    <div class="result-overlay" id="shopOverlay">
        <div class="result-icon">🏪</div>
        <div class="result-text" style="color:#ffd700">波间商店</div>
        <div class="result-score" id="shopInfo"></div>
        <div id="shopItems" style="display:flex; flex-direction:column; gap:10px; margin-top:16px; width:100%; max-width:320px;"></div>
        <button class="restart-btn" id="shopSkipBtn" style="background:#555; margin-top:12px;">⏩ 跳过</button>
    </div>

    <!-- V18: 暂停按钮 -->
    <button id="pauseBtn" style="
        position:fixed; top:10px; left:50%; transform:translateX(-50%);
        z-index:15; border:0; border-radius:12px;
        background:rgba(255,255,255,0.15); backdrop-filter:blur(8px);
        color:#fff; font-size:18px; padding:8px 20px;
        cursor:pointer; display:none;
    ">⏸</button>

    <!-- V18: 暂停菜单 -->
    <div class="result-overlay" id="pauseOverlay">
        <div class="result-icon">⏸</div>
        <div class="result-text" id="pauseTitle" style="color:#fff">已暂停</div>
        <div class="result-score" id="pauseInfo"></div>
        <div style="display:flex; gap:12px; margin-top:20px;">
            <button class="restart-btn" id="resumeBtn" style="background:#2ecc71">继续</button>
            <button class="restart-btn" id="pauseRestartBtn" style="background:#e74c3c">重新开始</button>
        </div>
    </div>

    <div class="breath-indicator" id="breathIndicator"></div>
    <div class="touch-hint" id="touchHint">滑动或点击方向键开始游戏</div>
    <div class="touch-controls" aria-label="屏幕方向键">
        <button class="control-btn control-up" type="button" data-direction="up" aria-label="向上">&#8593;</button>
        <button class="control-btn control-left" type="button" data-direction="left" aria-label="向左">&#8592;</button>
        <button class="control-btn control-down" type="button" data-direction="down" aria-label="向下">&#8595;</button>
        <button class="control-btn control-right" type="button" data-direction="right" aria-label="向右">&#8594;</button>
    </div>

    <script src="./icons/icon-map.js"></script>
    <script src="./visuals/texture-map.js"></script>
    <script src="./visuals/style-map.js"></script>
    <script src="./js/runtime-state.js"></script>
    <script src="./js/input-helpers.js"></script>
    <script src="./js/ui-overlays.js"></script>
    <script src="./js/debug-api.js"></script>

                snakeSkin: cellSize * 0.5,

            };

        function resizeCanvas() {
            const padding = 10;
            const maxWidth = window.innerWidth - padding * 2;
            const coarsePointer = window.matchMedia('(pointer: coarse)').matches;
            const reservedHeight = coarsePointer ? 180 : 20;
            const maxHeight = window.innerHeight - padding * 2 - reservedHeight;
            const maxSize = Math.min(maxWidth, maxHeight);
            
            cellSize = Math.floor(maxSize / BASE_CELL_DIVISOR);
            cellSize = Math.max(10, Math.min(40, cellSize));
            
            const canvasSize = cellSize * BASE_CELL_DIVISOR;

        // V12：扩展位置占用检查（包含蛇皮3x3区域）
        function isPositionOccupied(x, y) {
            if (snake.some(seg => seg.x === x && seg.y === y)) return true;
            if (foods.some(f => f.x === x && f.y === y)) return true;
            if (obstacles.some(o => o.x === x && o.y === y)) return true;
            // V12：检查蛇皮（每个蛇皮对象包含cells数组）
            if (snakeSkins.some(skin => skin.cells && skin.cells.some(c => c.x === x && c.y === y))) return true;
            // V17c: 传送门占位
            if (portalPairs.some(p => (p.a.x === x && p.a.y === y) || (p.b.x === x && p.b.y === y))) return true;
            
            const center = Math.floor(tileCount / 2);
            const halfWidth = Math.floor(portalWidth / 2);
            const portalStart = center - halfWidth;
            const portalEnd = center + halfWidth + (portalWidth % 2 === 0 ? -1 : 0);
            const portals = {
                top: { start: portalStart, end: portalEnd },
                bottom: { start: portalStart, end: portalEnd },
                left: { start: portalStart, end: portalEnd },
                right: { start: portalStart, end: portalEnd }
            };
            if ((y === 0 && x >= portals.top.start && x <= portals.top.end) ||
                (y === tileCount - 1 && x >= portals.bottom.start && x <= portals.bottom.end) ||
                (x === 0 && y >= portals.left.start && y <= portals.left.end) ||
                (x === tileCount - 1 && y >= portals.right.start && y <= portals.right.end)) {
                return true;
            }
            return false;
        }

        // ========== 统计正分食物数量 ==========
        // ========== 紧急补位机制 ==========
        function ensurePositiveFood() {
            const positiveCount = foods.filter(f => f.type.isPositive).length;
            if (positiveCount < 1) {
                const positiveTypes = [FOOD_TYPES.GROW, FOOD_TYPES.TELEPORT, FOOD_TYPES.BARRIER];
                const selectedType = positiveTypes[Math.floor(Math.random() * positiveTypes.length)];
                const padding = currentLevelConfig.foodField.wallPadding;
                const min = padding;
                const max = tileCount - padding - 1;
                let newFood = null;
                for (let attempts = 0; attempts < TUNING.generation.foodSpawnAttempts; attempts++) {
                    const x = Math.floor(Math.random() * (max - min + 1)) + min;
                    const y = Math.floor(Math.random() * (max - min + 1)) + min;
                    if (!canPlaceFoodAt(x, y)) continue;
                    newFood = {
                        x,
                        y,
                        type: selectedType,
                        pulsePhase: Math.random() * Math.PI * 2,
                        dangerShakePhase: 0,
                        windSpinPhase: 0
                    };
                    break;
                }

                if (newFood) {
                    foods.push(newFood);
                    console.log('[保底] 紧急补位正分食物:', selectedType.symbolMeaning);
                }
            }
        }

        // ========== V12：食物生成 ==========
        function spawnFood() {
            const maxFoods = Math.floor(Math.random() * 3) + 4;
            if (foods.length >= maxFoods) return;

            const positiveCount = foods.filter(f => f.type.isPositive).length;
            const mustGeneratePositive = positiveCount < 1;
            let selectedType;

            if (mustGeneratePositive) {
                const positiveTypes = [FOOD_TYPES.GROW, FOOD_TYPES.TELEPORT, FOOD_TYPES.BARRIER];
                selectedType = positiveTypes[Math.floor(Math.random() * positiveTypes.length)];
            } else {
                const types = Object.values(FOOD_TYPES);
                let rand = Math.random();
                selectedType = types[0];
                for (const type of types) {
                    rand -= type.probability;
                    if (rand <= 0) {
                        selectedType = type;
                        break;
                    }
                }
            }

            if (selectedType.effect === 'wind' && obstacles.length === 0) {
                const alternativeTypes = [FOOD_TYPES.GROW, FOOD_TYPES.TELEPORT, FOOD_TYPES.BARRIER];
                selectedType = alternativeTypes[Math.floor(Math.random() * alternativeTypes.length)];
            }

            const padding = currentLevelConfig.foodField.wallPadding;
            const min = padding;
            const max = tileCount - padding - 1;
            let newFood = null;
            for (let attempts = 0; attempts < TUNING.generation.foodSpawnAttempts; attempts++) {
                const x = Math.floor(Math.random() * (max - min + 1)) + min;
                const y = Math.floor(Math.random() * (max - min + 1)) + min;
                if (!canPlaceFoodAt(x, y)) continue;
                newFood = {
                    x,
                    y,
                    type: selectedType,
                    pulsePhase: Math.random() * Math.PI * 2,
                    dangerShakePhase: 0,
                    windSpinPhase: 0
                };
                break;
            }
            if (newFood) {
                foods.push(newFood);
            }
        }

        let flashAlpha = 0;
        let flashColor = 'rgba(255, 255, 255, ';
        function flashEffect(color = 'white') {
            flashAlpha = 0.6;
            const colors = {
                teleport: 'rgba(39, 174, 96, ',  // V12: 绿色瞬移效果
                death: 'rgba(231, 76, 60, ',
                wind: 'rgba(142, 68, 173, ',     // V12: 紫色清石效果
                barrier: 'rgba(26, 188, 156, ',  // V12: 青绿路障效果
                levelComplete: 'rgba(46, 204, 113, ',
                timeout: 'rgba(231, 76, 60, ',
                skin: 'rgba(139, 69, 19, '
            };
            flashColor = colors[color] || 'rgba(255, 255, 255, ';
        }
        
        let teleportPauseTimer = 0;
        const TELEPORT_PAUSE_DURATION = TUNING.visual.teleportPauseDuration;

        // ========== 路障食物生成石头（上限15，永久存在） ==========
        const MAX_OBSTACLES = TUNING.generation.maxObstacles;
        
        // ========== V16: 波次系统函数 ==========
        function generateWaveTerrain() {
            terrainZones = [];
            const counts = currentWave <= 1
                ? { ...TUNING.terrain.baseCounts.wave1 }
                : currentWave === 2
                    ? { ...TUNING.terrain.baseCounts.wave2 }
                    : currentWave === 3
                        ? { ...TUNING.terrain.baseCounts.wave3 }
                        : {
                            poison: 2 + Math.floor((currentWave - 3) / 2),
                            slow: 2 + Math.ceil((currentWave - 3) / 2)
                        };
            const spawnTerrainZone = (type) => {
                const padding = TUNING.terrain.spawnPadding;
                const head = snake[0];
                for (let attempts = 0; attempts < TUNING.generation.terrainZoneSpawnAttempts; attempts++) {
                    const cx = Math.floor(Math.random() * (tileCount - padding * 2)) + padding;
                    const cy = Math.floor(Math.random() * (tileCount - padding * 2)) + padding;
                    if (Math.abs(cx - head.x) + Math.abs(cy - head.y) < TUNING.terrain.minHeadDistance) continue;
                    const cells = [];
                    for (let dx = -1; dx <= 1; dx++) {
                        for (let dy = -1; dy <= 1; dy++) {
                            const x = cx + dx;
                            const y = cy + dy;
                            if (x < 0 || x >= tileCount || y < 0 || y >= tileCount) continue;
                            cells.push({ x, y });
                        }
                    }
                    return { type, centerX: cx, centerY: cy, cells };
                }
                return null;
            };
            for (let i = 0; i < counts.poison; i++) {
                const zone = spawnTerrainZone('poison');
                if (zone) terrainZones.push(zone);
            }
            for (let i = 0; i < counts.slow; i++) {
                const zone = spawnTerrainZone('slow');
                if (zone) terrainZones.push(zone);
            }
        }

        // V17fix: DoT 计步器
        let terrainDotStepCounter = 0;
        const TERRAIN_DOT_INTERVAL = TUNING.terrain.dotInterval; // 每3步触发一次
        let terrainDotType = null; // 当前所在地形类型（用于视觉）
        
        // V18b: Debuff 持续系统
        const DEBUFF_DURATION = TUNING.terrain.debuffDuration; // 10秒
        let poisonDebuffEnd = 0; // 中毒 debuff 结束时间戳
        let slowDebuffEnd = 0;   // 减速 debuff 结束时间戳
        const SLOW_MULTIPLIER = TUNING.speed.slowMultiplier; // 减速倍率

        // V17c: 传送门系统
        let portalPairs = []; // [{ a: {x,y}, b: {x,y}, color }]
        
        // V17b: 飘字系统
        let floatingTexts = []; // { x, y, text, color, age, maxAge, big }
        function spawnFloatingText(gridX, gridY, text, color, big = false) {
            floatingTexts.push({
                x: gridX * cellSize + cellSize / 2,
                y: gridY * cellSize,
                text: text,
                color: color,
                age: 0,
                maxAge: 0.8,
                big: big
            });
        }
        // V19: 商店系统
        // ========== shop-wave-flow 包装层 (Patch 1) ==========
        // ========== 原始函数（保持不变） ==========
        function openShop() {
            if (!enterShopState()) return;
            activeBuffs = activeBuffs.filter(b => {
                b.remaining--;
                return b.remaining > 0;
            });
            stopGameLoop();
            syncPauseButtonVisibility();
            const shuffledShopItems = [...SHOP_POOL].sort(() => Math.random() - 0.5);
            shopItems = shuffledShopItems.slice(0, 3);
            shopItems.push({ id: 'heal', name: '回复', icon: '❤️', cost: 3, payType: 'coins', desc: '+2节蛇身', category: 'heal' });
            shopItems.push({ id: 'grow_tail', name: '加长', icon: '🐍', cost: 5, payType: 'coins', desc: '+4节蛇身', category: 'heal' });
            const shopInfo = document.getElementById('shopInfo');
            const shopItemsDiv = document.getElementById('shopItems');
            shopInfo.textContent = UI_TEXT.shop.info(coins, snake.length, currentWave);
            shopItemsDiv.innerHTML = '';
            shopItems.forEach(item => {
                const canAfford = !item || item.cost <= 0
                    ? true
                    : item.payType === 'coins'
                        ? coins >= item.cost
                        : coins >= Math.max(0, item.cost - Math.max(0, snake.length - 2));
                const btn = document.createElement('button');
                btn.className = 'restart-btn';
                btn.style.cssText = `
                    background: ${canAfford ? '#2a2a4a' : '#1a1a2a'}; 
                    border: 1px solid ${canAfford ? '#ffd700' : '#555'}; 
                    color: ${canAfford ? '#fff' : '#666'};
                    padding: 10px 16px; text-align: left; font-size: 14px;
                    display: flex; justify-content: space-between; align-items: center;
                    width: 100%; border-radius: 8px;
                `;
                const priceText = !item || item.cost <= 0
                    ? '免费'
                    : item.payType === 'coins'
                        ? `${item.cost} 金币`
                        : (() => {
                            const bodyPay = Math.min(item.cost, Math.max(0, snake.length - 2));
                            const coinPay = Math.max(0, item.cost - bodyPay);
                            if (coinPay > 0 && bodyPay > 0) return `-${bodyPay}节 + ${coinPay}金币`;
                            if (coinPay > 0) return `${coinPay} 金币`;
                            return `-${item.cost} 节`;
                        })();
                btn.innerHTML = `
                    <span>${item.icon} ${item.name} <small style="color:#aaa">${item.desc}</small></span>
                    <span style="color:${item.cost > 0 ? '#ffd166' : '#2ecc71'}">${priceText}</span>
                `;
                if (canAfford) {
                    btn.onclick = () => {
                        if (item.cost > 0) {
                            if (item.payType === 'coins') {
                                coins = Math.max(0, coins - item.cost);
                            } else {
                                const removeCount = Math.min(item.cost, Math.max(0, snake.length - 2));
                                for (let i = 0; i < removeCount; i++) {
                                    snake.pop();
                                }
                                const shortfall = Math.max(0, item.cost - removeCount);
                                if (shortfall > 0) {
                                    coins = Math.max(0, coins - shortfall);
                                }
                            }
                        }

                        switch (item.id) {
                            case 'poison_resist':
                                activeBuffs.push({ id: 'poison_resist', remaining: 1 });
                                break;
                            case 'ice_armor':
                                activeBuffs.push({ id: 'ice_armor', remaining: 1 });
                                break;
                            case 'shield':
                                shieldCharges++;
                                break;
                            case 'dash':
                                dashCharges++;
                                break;
                            case 'magnet':
                                activeBuffs.push({ id: 'magnet', remaining: 1 });
                                break;
                            case 'clear':
                                snakeSkins = [];
                                obstacles = [];
                                break;
                            case 'heal':
                                for (let i = 0; i < 2; i++) {
                                    const tail = snake[snake.length - 1];
                                    snake.push({ x: tail.x, y: tail.y });
                                }
                                break;
                            case 'grow_tail':
                                for (let i = 0; i < 4; i++) {
                                    const tail = snake[snake.length - 1];
                                    snake.push({ x: tail.x, y: tail.y });
                                }
                                break;
                        }
                        if (!isShopState() && !isShopOpeningState()) return;
                        closeShopState();
                        resetTeleportPreviewState();
                        closeAllOverlays();
                        if (!enterWaveTransition()) return;
                        stopGameLoop();
                        clearInterval(waveTransitionInterval);
                        waveTransitionInterval = null;
                        renderWaveTransitionOverlay();
                        restartWaveTransitionCountdown();
                    };
                } else {
                    btn.disabled = true;
                }
                shopItemsDiv.appendChild(btn);
            });
            document.getElementById('shopSkipBtn').onclick = () => {
                if (!isShopState() && !isShopOpeningState()) return;
                closeShopState();
                resetTeleportPreviewState();
                closeAllOverlays();
                if (!enterWaveTransition()) return;
                stopGameLoop();
                clearInterval(waveTransitionInterval);
                waveTransitionInterval = null;
                renderWaveTransitionOverlay();
                restartWaveTransitionCountdown();
            };
            showShopOverlay();
            finishShopOpening();
        }

        // 更新状态UI
        function updateStatusUI() {
            // V16: wave display
            const surviveMin = Math.floor(totalSurvivalTime / 60).toString().padStart(2, '0');
            const surviveSec = Math.floor(totalSurvivalTime % 60).toString().padStart(2, '0');
            
            timerDisplay.textContent = `Wave ${currentWave}`;
            scoreDisplay.textContent = UI_TEXT.hud.score(score, coins);
            targetDisplay.textContent = UI_TEXT.hud.survival(`${surviveMin}:${surviveSec}`);
            
            timerDisplay.classList.remove('warning', 'critical');
            const waveElapsed = Date.now() - waveStartTime;
            const waveRemaining = (WAVE_DURATION - waveElapsed) / 1000;
            if (isCeremonyLootBurstState()) {
                const lootRemainingTime = Math.max(0, Math.ceil((lootBurstEndTime - Date.now()) / 1000));
                timerDisplay.textContent = `金币狂欢 ${lootRemainingTime}s`;
                timerDisplay.classList.add('warning');
                targetDisplay.textContent = `已收集: ${lootEatenCount}/${lootTotalCount}`;
            } else {
                const displayWaveSeconds = Math.max(0, Math.ceil(waveRemaining - 0.15));
                timerDisplay.textContent = `Wave ${currentWave} · ${displayWaveSeconds}s`;
                if (displayWaveSeconds <= 5 && displayWaveSeconds > 0 && !isWaveTransitionState()) {
                    timerDisplay.classList.add('warning');
                }
            }
            
            {
                const nowSnapshot = Date.now();
                const waveElapsed = waveStartTime ? (nowSnapshot - waveStartTime) : null;
                const waveRemaining = waveElapsed === null ? null : (WAVE_DURATION - waveElapsed) / 1000;
                timerTraceBuffer.push({
                    now: nowSnapshot,
                    timerText: timerDisplay.textContent,
                    waveStartTime,
                    waveElapsed,
                    waveRemaining,
                    waveCeremonyState,
                    isWaveTransition,
                    isPaused,
                    currentWave
                });
            }
            if (timerTraceBuffer.length > TIMER_TRACE_LIMIT) {
                timerTraceBuffer.shift();
            }

            // V18b: debuff 状态显示
            const now2 = Date.now();
            let debuffStr = '';
            if (now2 < poisonDebuffEnd) {
                const pSec = Math.ceil((poisonDebuffEnd - now2) / 1000);
                debuffStr += UI_TEXT.hud.debuffPoison(pSec);
            }
            if (now2 < slowDebuffEnd) {
                const sSec = Math.ceil((slowDebuffEnd - now2) / 1000);
                debuffStr += UI_TEXT.hud.debuffSlow(sSec);
            }
            if (debuffStr) {
                targetDisplay.textContent += debuffStr;
            }
            // V19: buff 显示
            let buffStr = '';
            if (shieldCharges > 0) buffStr += UI_TEXT.hud.shield(shieldCharges);
            if (dashCharges > 0) buffStr += UI_TEXT.hud.dash(dashCharges);
            if (hasBuff('poison_resist')) buffStr += UI_TEXT.hud.poisonResist;
            if (hasBuff('ice_armor')) buffStr += UI_TEXT.hud.iceArmor;
            if (hasBuff('magnet')) buffStr += UI_TEXT.hud.magnet;
            if (buffStr) {
                timerDisplay.textContent += buffStr;
            }
        }

        function hideResult() {
            closeAllOverlays();
        }

        // 游戏主循环
        // ========== 原始函数（保持不变） ==========
        function gameStep() {
            if (isWaveTransitionState()) return; // 波次过渡中不更新
            
            const now = Date.now();
            totalSurvivalTime = (now - gameStartTime) / 1000;
            const waveElapsed = now - waveStartTime;
            
            if (waveElapsed >= WAVE_DURATION && isCeremonyPlayingState()) {
                setCeremonyState('KEY_SPAWN');
                clearWavePlayfieldState();
                {
                    const minDistance = TUNING.ceremony.keyMinDistance;
                    const fallback = { x: Math.floor(tileCount / 2), y: TUNING.ceremony.keyFallbackY };
                    const head = snake[0];
                    ceremonyKey = null;
                    for (let attempts = 0; attempts < TUNING.generation.ceremonySpawnAttempts; attempts++) {
                        const x = Math.floor(Math.random() * (tileCount - 4)) + 2;
                        const y = Math.floor(Math.random() * (tileCount - 4)) + 2;
                        const farEnough = !head || (Math.abs(x - head.x) + Math.abs(y - head.y) >= minDistance);
                        if (!farEnough || isPositionOccupied(x, y)) continue;
                        ceremonyKey = { x, y };
                        break;
                    }
                    if (!ceremonyKey && fallback && !isPositionOccupied(fallback.x, fallback.y)) {
                        ceremonyKey = { ...fallback };
                    }
                    if (!ceremonyKey) {
                        for (let y = 1; y < tileCount - 1 && !ceremonyKey; y++) {
                            for (let x = 1; x < tileCount - 1; x++) {
                                const farEnough = !head || (Math.abs(x - head.x) + Math.abs(y - head.y) >= minDistance);
                                if (!farEnough || isPositionOccupied(x, y)) continue;
                                ceremonyKey = { x, y };
                                break;
                            }
                        }
                    }
                    if (!ceremonyKey) {
                        ceremonyKey = fallback ? { ...fallback } : null;
                    }
                }
                spawnFloatingText(Math.floor(tileCount / 2), Math.floor(tileCount / 2), UI_TEXT.floating.keyFound, '#ffd700', true);
            }
            const ceremonyHead = snake[0];
            if (isCeremonyKeyState() && ceremonyKey && ceremonyHead.x === ceremonyKey.x && ceremonyHead.y === ceremonyKey.y) {
                setCeremonyState('CHEST_SPAWN');
                ceremonyKey = null;
                flashEffect('teleport');
                flashAlpha = 0.3;
                {
                    const minDistance = TUNING.ceremony.chestMinDistance;
                    const fallback = { x: Math.floor(tileCount / 2), y: Math.floor(tileCount / 2) };
                    const head = snake[0];
                    ceremonyChest = null;
                    for (let attempts = 0; attempts < TUNING.generation.ceremonySpawnAttempts; attempts++) {
                        const x = Math.floor(Math.random() * (tileCount - 4)) + 2;
                        const y = Math.floor(Math.random() * (tileCount - 4)) + 2;
                        const farEnough = !head || (Math.abs(x - head.x) + Math.abs(y - head.y) >= minDistance);
                        if (!farEnough || isPositionOccupied(x, y)) continue;
                        ceremonyChest = { x, y };
                        break;
                    }
                    if (!ceremonyChest && fallback && !isPositionOccupied(fallback.x, fallback.y)) {
                        ceremonyChest = { ...fallback };
                    }
                    if (!ceremonyChest) {
                        for (let y = 1; y < tileCount - 1 && !ceremonyChest; y++) {
                            for (let x = 1; x < tileCount - 1; x++) {
                                const farEnough = !head || (Math.abs(x - head.x) + Math.abs(y - head.y) >= minDistance);
                                if (!farEnough || isPositionOccupied(x, y)) continue;
                                ceremonyChest = { x, y };
                                break;
                            }
                        }
                    }
                    if (!ceremonyChest) {
                        ceremonyChest = fallback ? { ...fallback } : null;
                    }
                }
                spawnFloatingText(ceremonyHead.x, ceremonyHead.y, UI_TEXT.floating.keyGet, '#ffd700', true);
            }
            if (isCeremonyChestState() && ceremonyChest && ceremonyHead.x === ceremonyChest.x && ceremonyHead.y === ceremonyChest.y) {
                setCeremonyState('LOOT_BURST');
                ceremonyChest = null;
                flashEffect('grow');
                flashAlpha = 0.4;
                spawnFloatingText(ceremonyHead.x, ceremonyHead.y, UI_TEXT.floating.coinFrenzy, '#ffd700', true);
                clearWavePlayfieldState();
                resetLootBurstState();
                lootBurstEndTime = Date.now() + TUNING.wave.lootBurstDuration;
                const targetLootCount = Math.min(TUNING.wave.lootMax, Math.max(TUNING.wave.lootMin, Math.floor(tileCount * TUNING.wave.lootTileFactor)));
                for (let i = 0; i < targetLootCount; i++) {
                    for (let att = 0; att < TUNING.generation.lootSpawnAttempts; att++) {
                        const fx = Math.floor(Math.random() * (tileCount - 2)) + 1;
                        const fy = Math.floor(Math.random() * (tileCount - 2)) + 1;
                        if (!isPositionOccupied(fx, fy) && !lootFoods.some(l => l.x === fx && l.y === fy)) {
                            lootFoods.push({ x: fx, y: fy, eaten: false });
                            break;
                        }
                    }
                }
                lootTotalCount = lootFoods.length;
            }
            if (isCeremonyLootBurstState()) {
                lootFoods.forEach(lf => {
                    if (!lf.eaten && ceremonyHead.x === lf.x && ceremonyHead.y === lf.y) {
                        lf.eaten = true;
                        lootEatenCount++;
                        coins += 1;
                        score += 5;
                        spawnFloatingText(lf.x, lf.y, UI_TEXT.floating.coinGain(1), '#ffd700', false);
                    }
                });
                const lootRemaining = lootFoods.filter(lf => !lf.eaten).length;
                if (lootRemaining <= 0 || Date.now() >= lootBurstEndTime) {
                    openShop();
                    return;
                }
            }
            if (isCeremonyPlayingState()) {
                foodSpawnTimer += currentInterval;
                const spawnInterval = currentWave <= 1
                    ? TUNING.spawn.foodIntervalWave1
                    : currentWave <= 2
                        ? TUNING.spawn.foodIntervalWave2
                        : currentWave <= 3
                            ? TUNING.spawn.foodIntervalWave2 - 200
                            : Math.max(TUNING.spawn.foodIntervalMin, TUNING.spawn.foodIntervalWave1 - currentWave * TUNING.spawn.foodIntervalWaveDecay);
                if (foodSpawnTimer >= spawnInterval) {
                    foodSpawnTimer = 0;
                    spawnFood();
                    ensurePositiveFood();
                }
            }
            if (selectedModule) {
                const terrainNow = Date.now();
                const terrainHead = snake[0];
                let inTerrain = null;
                for (const zone of terrainZones) {
                    if (zone.cells.some(c => c.x === terrainHead.x && c.y === terrainHead.y)) {
                        inTerrain = zone;
                        break;
                    }
                }
                if (inTerrain) {
                    const zoneKey = inTerrain.type + '_' + inTerrain.centerX + '_' + inTerrain.centerY;
                    terrainDotType = inTerrain.type;
                    if (lastTerrainTrigger !== zoneKey) {
                        lastTerrainTrigger = zoneKey;
                        terrainDotStepCounter = 0;
                    }
                    terrainDotStepCounter++;
                    if (inTerrain.type === 'poison' && selectedModule.id !== 'venom') {
                        poisonDebuffEnd = terrainNow + DEBUFF_DURATION;
                    }
                    if (inTerrain.type === 'poison' && selectedModule.id === 'venom') {
                        if (terrainDotStepCounter % TERRAIN_DOT_INTERVAL === 0) {
                            score += 5;
                            spawnFloatingText(terrainHead.x, terrainHead.y, '+5', '#a855f7', false);
                            updateStatusUI();
                        }
                    }
                    if (inTerrain.type === 'slow') {
                        const dur = hasBuff('ice_armor') ? DEBUFF_DURATION / 2 : DEBUFF_DURATION;
                        slowDebuffEnd = terrainNow + dur;
                        if (terrainDotStepCounter % TERRAIN_DOT_INTERVAL === 0) {
                            score -= 3;
                            spawnFloatingText(terrainHead.x, terrainHead.y, '-3', '#60a5fa', false);
                            updateStatusUI();
                        }
                    }
                } else {
                    lastTerrainTrigger = null;
                    terrainDotStepCounter = 0;
                }
                const isPoisoned = terrainNow < poisonDebuffEnd;
                const isSlowed = terrainNow < slowDebuffEnd;
                if (isPoisoned) {
                    terrainDotType = 'poison';
                    if (Math.random() < 0.1) {
                        const dmg = hasBuff('poison_resist') ? 1 : 2;
                        score -= dmg;
                        spawnFloatingText(terrainHead.x, terrainHead.y, `-${dmg}`, '#c084fc', false);
                        updateStatusUI();
                    }
                }
                if (isSlowed) {
                    terrainDotType = terrainDotType || 'slow';
                }
                if (!isPoisoned && !isSlowed) {
                    terrainDotType = null;
                }
            }
            const isCurrentlySlowed = Date.now() < slowDebuffEnd;
            if (isCurrentlySlowed && !isPausedState()) {
                const slowInterval = 500;
                if (!lastSlowInterval || lastSlowInterval !== slowInterval) {
                    lastSlowInterval = slowInterval;
                    restartGameLoopWithInterval();
                }
            } else if (lastSlowInterval) {
                lastSlowInterval = null;
                restartGameLoopWithInterval();
            }
            
            updateStatusUI();
            
            direction = { ...nextDirection };
            let head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };
            const center = Math.floor(tileCount / 2);
            const halfWidth = Math.floor(portalWidth / 2);
            const portalStart = center - halfWidth;
            const portalEnd = center + halfWidth + (portalWidth % 2 === 0 ? -1 : 0);
            const portals = {
                top: { start: portalStart, end: portalEnd },
                bottom: { start: portalStart, end: portalEnd },
                left: { start: portalStart, end: portalEnd },
                right: { start: portalStart, end: portalEnd }
            };
            let hitWall = false;
            if (head.x < 0) {
                if (!isCeremonyPlayingState() || (head.y >= portals.left.start && head.y <= portals.left.end)) {
                    head = { ...head, x: tileCount - 1 };
                } else {
                    hitWall = true;
                }
            } else if (head.x >= tileCount) {
                if (!isCeremonyPlayingState() || (head.y >= portals.right.start && head.y <= portals.right.end)) {
                    head = { ...head, x: 0 };
                } else {
                    hitWall = true;
                }
            } else if (head.y < 0) {
                if (!isCeremonyPlayingState() || (head.x >= portals.top.start && head.x <= portals.top.end)) {
                    head = { ...head, y: tileCount - 1 };
                } else {
                    hitWall = true;
                }
            } else if (head.y >= tileCount) {
                if (!isCeremonyPlayingState() || (head.x >= portals.bottom.start && head.x <= portals.bottom.end)) {
                    head = { ...head, y: 0 };
                } else {
                    hitWall = true;
                }
            }
            if (hitWall) {
                gameOver('wall');
                return;
            }

            if (portalTeleportCooldown > 0) {
                portalTeleportCooldown--;
            } else {
                let portalHit = null;
                for (const pair of portalPairs) {
                    if (head.x === pair.a.x && head.y === pair.a.y) {
                        portalHit = { dest: pair.b, pair };
                        break;
                    }
                    if (head.x === pair.b.x && head.y === pair.b.y) {
                        portalHit = { dest: pair.a, pair };
                        break;
                    }
                }
                if (portalHit) {
                    head = {
                        x: portalHit.dest.x,
                        y: portalHit.dest.y
                    };
                    portalTeleportCooldown = TUNING.portal.teleportCooldownFrames;
                    teleportInvincibleSteps = 3;
                    headGlowTimer = HEAD_GLOW_DURATION;
                    flashEffect('teleport');
                    flashAlpha = 0.3;
                }
            }

            let eatenFoodIndex = -1;
            let minDist = Infinity;
            const pickupRadius = hasBuff('magnet') ? TUNING.pickup.magnetRadius : TUNING.pickup.defaultRadius;
            for (let i = 0; i < foods.length; i++) {
                const dx = head.x - foods[i].x;
                const dy = head.y - foods[i].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist <= pickupRadius && dist < minDist) {
                    minDist = dist;
                    eatenFoodIndex = i;
                }
            }
            const willEatFood = eatenFoodIndex !== -1;
            const collisionSegments = willEatFood ? snake : snake.slice(0, -1);

            if (teleportInvincibleSteps > 0) {
                teleportInvincibleSteps--;
            } else if (isCeremonyPlayingState() && collisionSegments.some(seg => seg.x === head.x && seg.y === head.y)) {
                gameOver('self');
                return;
            }

            if (isCeremonyPlayingState()) {
                const hitObstacleIdx = obstacles.findIndex(o => o.x === head.x && o.y === head.y);
                if (hitObstacleIdx !== -1) {
                    if (selectedModule && selectedModule.special === 'breakObstacle') {
                        obstacles.splice(hitObstacleIdx, 1);
                        score += 5;
                        flashEffect('barrier');
                        updateStatusUI();
                    } else if (shieldCharges > 0) {
                        shieldCharges--;
                        obstacles.splice(hitObstacleIdx, 1);
                        spawnFloatingText(head.x, head.y, UI_TEXT.floating.shield, '#2ecc71', true);
                        flashEffect('teleport');
                        flashAlpha = 0.3;
                    } else {
                        gameOver('obstacle');
                        return;
                    }
                }
            }

            if (isCeremonyPlayingState() && snakeSkins.some(skin => skin.cells && skin.cells.some(c => c.x === head.x && c.y === head.y))) {
                gameOver('skin');
                return;
            }

            const eatenFood = eatenFoodIndex === -1 ? null : foods.splice(eatenFoodIndex, 1)[0];

            snake.unshift(head);
            if (eatenFood) {
                const effect = eatenFood.type.effect;
                headGlowTimer = 0;
                teleportTrailTimer = 0;
                teleportPreview = null;

                const modScore = (selectedModule && selectedModule.scoreModifiers[effect] !== undefined)
                    ? selectedModule.scoreModifiers[effect]
                    : FOOD_TYPES[effect.toUpperCase()] ? FOOD_TYPES[effect.toUpperCase()].score : 0;
                const foodHead = snake[0];
                const scoreText = modScore >= 0 ? `+${modScore}` : `${modScore}`;
                const scoreColor = modScore >= 0 ? '#4ade80' : '#f87171';
                spawnFloatingText(foodHead.x, foodHead.y, scoreText, scoreColor, Math.abs(modScore) >= 20);

                if (effect === 'grow') {
                    score += modScore;
                    const speed = BASE_SPEED * Math.exp(-TUNING.speed.scoreDecayK * score);
                    const newInterval = Math.max(MIN_SPEED, speed);
                    const oldInterval = currentInterval;
                    currentInterval = newInterval;
                    if (newInterval !== oldInterval || isSpeedBoosted || Date.now() < slowDebuffEnd) {
                        restartGameLoopWithInterval();
                    }
                    backgroundHue = 240 - (Math.max(0, score) / 500) * 240;
                    if (backgroundHue < 0) backgroundHue = 0;
                } else if (effect === 'shrink') {
                    if (snake.length > 3) {
                        const dropped = snake.pop();
                        if (dropped && !isPositionOccupied(dropped.x, dropped.y)) {
                            snakeSkins.push({
                                centerX: dropped.x,
                                centerY: dropped.y,
                                cells: [{ x: dropped.x, y: dropped.y }],
                                spawnTime: Date.now()
                            });
                        }
                    }
                    score += modScore;
                    isSpeedBoosted = true;
                    speedBoostTimer = speedBoostDuration;
                    restartGameLoopWithInterval(Math.max(currentInterval * TUNING.speed.speedBoostMultiplier, MIN_SPEED));
                } else if (effect === 'teleport') {
                    score += modScore;
                    if (snake.length >= 2) {
                        const oldHeadPos = { x: snake[0].x, y: snake[0].y };
                        const oldTailPos = { x: snake[snake.length - 1].x, y: snake[snake.length - 1].y };
                        teleportPreview = { x: oldTailPos.x, y: oldTailPos.y };
                        teleportTrailTimer = TELEPORT_TRAIL_DURATION;
                        const oldDirection = { x: direction.x, y: direction.y };
                        snake = snake.reverse();
                        snake[0] = { x: oldTailPos.x, y: oldTailPos.y };
                        snake[snake.length - 1] = { x: oldHeadPos.x, y: oldHeadPos.y };
                        const newHead = snake[0];
                        const newSecond = snake[1];
                        const newDirection = {
                            x: newHead.x - newSecond.x,
                            y: newHead.y - newSecond.y
                        };
                        if (newDirection.x === 0 && newDirection.y === 0) {
                            newDirection.x = -oldDirection.x;
                            newDirection.y = -oldDirection.y;
                        }
                        direction = newDirection;
                        nextDirection = { ...newDirection };
                        headGlowTimer = HEAD_GLOW_DURATION;
                        flashEffect('teleport');
                        teleportPauseTimer = TELEPORT_PAUSE_DURATION;
                        stopGameLoop();
                        setTimeout(() => {
                            if (isGameRunning && !isLevelComplete && !isGameOver) {
                                teleportPauseTimer = 0;
                                restartGameLoopWithInterval();
                            }
                        }, TELEPORT_PAUSE_DURATION);
                        teleportInvincibleSteps = 3;
                    }
                } else if (effect === 'barrier') {
                    score += modScore;
                    {
                        const headPos = snake[0];
                        const stoneCount = Math.floor(Math.random() * 4) + 3;
                        const currentObstacleCount = obstacles.length;
                        const canSpawnCount = Math.min(stoneCount, MAX_OBSTACLES - currentObstacleCount);
                        if (canSpawnCount <= 0) {
                            console.log('[路障V13] 石头已达上限15，跳过生成');
                        } else {
                            for (let i = 0; i < canSpawnCount; i++) {
                                let attempts = 0;
                                let targetX;
                                let targetY;
                                do {
                                    targetX = Math.floor(Math.random() * tileCount);
                                    targetY = Math.floor(Math.random() * tileCount);
                                    attempts++;
                                    const dx = Math.abs(targetX - headPos.x);
                                    const dy = Math.abs(targetY - headPos.y);
                                    const tooCloseToHead = dx <= 3 && dy <= 3;
                                    if (tooCloseToHead) continue;
                                    if (!isPositionOccupied(targetX, targetY)) {
                                        obstacles.push({
                                            x: targetX,
                                            y: targetY,
                                            spawnTime: Date.now()
                                        });
                                        break;
                                    }
                                } while (attempts < 100);
                            }
                            flashEffect('barrier');
                            if (obstacles.length > MAX_OBSTACLES) {
                                obstacles = obstacles.slice(-MAX_OBSTACLES);
                            }
                        }
                    }
                } else if (effect === 'wind') {
                    score += modScore;
                    if (obstacles.length > 0) {
                        obstacles = [];
                        flashEffect('wind');
                    }
                }

                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem(STORAGE_KEYS.highScore, highScore);
                }

                updateStatusUI();
                spawnFood();
                ensurePositiveFood();
            } else {
                snake.pop();
            }
            if (dashBurstTicks > 0) {
                dashBurstTicks--;
            }
            if (isSpeedBoosted) {
                speedBoostTimer -= currentInterval;
                if (speedBoostTimer <= 0) {
                    isSpeedBoosted = false;
                    dashBurstTicks = 0;
                    restartGameLoopWithInterval();
                }
            }
        }

        // ========== V12：食物绘制（带旋风动画） ==========

        // V19c: 形状到图标的映射
        const SHAPE_TO_ICON = {
            'grow_orb': 'food_grow',
            'danger_square': 'food_shrink',
            'shrink_rune': 'food_shrink',
            'teleport_gate': 'food_teleport',
            'barrier_sign': 'food_barrier',
            'barrier_core': 'food_barrier',
            'wind_star': 'food_wind',
            'hexagon': 'food_barrier'
        };

        function drawFood(food, time) {
            const scale = getScaleFactors();
            let x = food.x * cellSize + cellSize / 2;
            let y = food.y * cellSize + cellSize / 2;

            if (food.type.isDanger && !food.type.isWind) {
                const shakeAmount = Math.sin(time * 15 + (food.dangerShakePhase || 0)) * 2;
                x += shakeAmount;
                y += shakeAmount * 0.5;
            }

            const windRotation = food.type.isWind ? (time * 3 + (food.windSpinPhase || 0)) : 0;
            const pulse = Math.sin(time * 3 + food.pulsePhase) * 0.05 + 0.95;
            const size = cellSize * 0.45 * pulse; // V18d: 食物占满1格（直径≈90%格子）
            const markerRadius = cellSize * 0.48; // 底圈也占满
            const markerFill = food.type.isDanger
                ? 'rgba(94, 17, 17, 0.34)'
                : food.type.isWind
                    ? 'rgba(20, 74, 89, 0.30)'
                    : 'rgba(36, 49, 24, 0.26)';
            const markerStroke = food.type.isDanger
                ? 'rgba(255, 196, 196, 0.68)'
                : food.type.isWind
                    ? 'rgba(204, 244, 255, 0.68)'
                    : 'rgba(252, 245, 214, 0.62)';

            // V19c: 检查是否有图标可用
            const iconKey = SHAPE_TO_ICON[food.type.shape];
            const iconImg = iconKey ? ICON_IMAGES[iconKey] : null;
            const useIcon = iconImg && iconImg.complete && iconImg.naturalWidth > 0;

            // V19d: 仅在 Canvas fallback 时绘制底圈和边框，图标模式下不画
            if (!useIcon) {
                ctx.save();
                ctx.shadowBlur = 0;
                ctx.fillStyle = markerFill;
                ctx.beginPath();
                ctx.arc(x, y, markerRadius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = markerStroke;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(x, y, markerRadius + 1.5, 0, Math.PI * 2);
                ctx.stroke();
                
                // V17: 模块适性光圈（绿=有利，红=不利，白=中性）
                if (selectedModule) {
                    const modScore = selectedModule.scoreModifiers[food.type.effect] || 0;
                    let auraColor;
                    if (modScore > 5) auraColor = 'rgba(46, 204, 113, 0.6)';
                    else if (modScore < -3) auraColor = 'rgba(231, 76, 60, 0.5)';
                    else auraColor = 'rgba(200, 200, 200, 0.25)';
                    
                    const auraPulse = Math.sin(time * 4 + food.pulsePhase) * 0.3 + 0.7;
                    ctx.strokeStyle = auraColor;
                    ctx.lineWidth = 2.5;
                    ctx.shadowColor = auraColor;
                    ctx.shadowBlur = 8 * auraPulse;
                    ctx.beginPath();
                    ctx.arc(x, y, markerRadius + 4, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }
                ctx.restore();
            }

            ctx.shadowColor = food.type.glow;
            ctx.shadowBlur = useIcon ? 0 : 12; // V19d: 图标模式下也去掉阴影
            ctx.fillStyle = food.type.color;

            if (windRotation) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(windRotation);
                x = 0;
                y = 0;
            }

            if (useIcon) {
                const drawSize = cellSize * 0.9;
                ctx.drawImage(iconImg, x - drawSize/2, y - drawSize/2, drawSize, drawSize);
            } else {
            // fallback: 原始 Canvas 绘制
            switch (food.type.shape) {
                case 'grow_orb':
                    // V17: 向上箭头 = 增长
                    ctx.beginPath();
                    ctx.moveTo(x, y - size * 0.9);
                    ctx.lineTo(x + size * 0.7, y + size * 0.2);
                    ctx.lineTo(x + size * 0.25, y + size * 0.2);
                    ctx.lineTo(x + size * 0.25, y + size * 0.8);
                    ctx.lineTo(x - size * 0.25, y + size * 0.8);
                    ctx.lineTo(x - size * 0.25, y + size * 0.2);
                    ctx.lineTo(x - size * 0.7, y + size * 0.2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(246, 255, 208, 0.95)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    break;

                case 'teleport_gate':
                    // V21: 做成更直观的首尾互换图标
                    const ringOffset = size * 0.28;
                    const ringRadius = size * 0.34;
                    ctx.lineWidth = 2.6;
                    ctx.strokeStyle = 'rgba(255, 238, 179, 0.95)';
                    ctx.beginPath();
                    ctx.arc(x - ringOffset, y, ringRadius, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(x + ringOffset, y, ringRadius, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.fillStyle = 'rgba(255, 209, 102, 0.98)';
                    ctx.beginPath();
                    ctx.arc(x - ringOffset, y, size * 0.11, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = 'rgba(110, 231, 255, 0.98)';
                    ctx.beginPath();
                    ctx.arc(x + ringOffset, y, size * 0.11, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.96)';
                    ctx.lineWidth = 2.2;
                    ctx.beginPath();
                    ctx.moveTo(x - size * 0.05, y - size * 0.18);
                    ctx.lineTo(x + size * 0.05, y - size * 0.18);
                    ctx.lineTo(x + size * 0.05, y - size * 0.28);
                    ctx.lineTo(x + size * 0.2, y - size * 0.1);
                    ctx.lineTo(x + size * 0.05, y + size * 0.08);
                    ctx.lineTo(x + size * 0.05, y - size * 0.02);
                    ctx.lineTo(x - size * 0.05, y - size * 0.02);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x + size * 0.05, y + size * 0.18);
                    ctx.lineTo(x - size * 0.05, y + size * 0.18);
                    ctx.lineTo(x - size * 0.05, y + size * 0.28);
                    ctx.lineTo(x - size * 0.2, y + size * 0.1);
                    ctx.lineTo(x - size * 0.05, y - size * 0.08);
                    ctx.lineTo(x - size * 0.05, y + size * 0.02);
                    ctx.lineTo(x + size * 0.05, y + size * 0.02);
                    ctx.stroke();
                    break;

                case 'teleport_gate_legacy':
                    ctx.lineWidth = 2.4;
                    ctx.strokeStyle = 'rgba(255, 238, 179, 0.95)';
                    ctx.beginPath();
                    ctx.arc(x - size * 0.32, y, size * 0.44, -Math.PI * 0.2, Math.PI * 1.2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(x + size * 0.32, y, size * 0.44, Math.PI * 0.8, Math.PI * 2.2);
                    ctx.stroke();
                    ctx.fillStyle = 'rgba(255, 209, 102, 0.95)';
                    ctx.beginPath();
                    ctx.arc(x - size * 0.34, y, size * 0.15, 0, Math.PI * 2);
                    ctx.arc(x + size * 0.34, y, size * 0.15, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255, 245, 214, 0.9)';
                    ctx.beginPath();
                    ctx.moveTo(x - size * 0.08, y - size * 0.23);
                    ctx.lineTo(x + size * 0.08, y);
                    ctx.lineTo(x - size * 0.08, y + size * 0.23);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(x + size * 0.08, y - size * 0.23);
                    ctx.lineTo(x - size * 0.08, y);
                    ctx.lineTo(x + size * 0.08, y + size * 0.23);
                    ctx.stroke();
                    ctx.fillStyle = food.type.color;
                    break;

                case 'barrier_core':
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle = (i * Math.PI / 3) - Math.PI / 6;
                        const px = x + Math.cos(angle) * size * 0.92;
                        const py = y + Math.sin(angle) * size * 0.92;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(244, 214, 179, 0.95)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.strokeStyle = 'rgba(78, 52, 46, 0.8)';
                    ctx.lineWidth = 2.2;
                    ctx.beginPath();
                    ctx.moveTo(x - size * 0.42, y - size * 0.1);
                    ctx.lineTo(x + size * 0.42, y - size * 0.1);
                    ctx.moveTo(x - size * 0.34, y + size * 0.2);
                    ctx.lineTo(x + size * 0.34, y + size * 0.2);
                    ctx.stroke();
                    break;

                case 'shrink_rune':
                    ctx.beginPath();
                    ctx.arc(x, y, size * 0.70, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255, 214, 214, 0.85)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(x, y, size * 0.9, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.strokeStyle = 'rgba(120, 10, 18, 0.9)';
                    ctx.lineWidth = 2.2;
                    ctx.beginPath();
                    ctx.moveTo(x - size * 0.42, y);
                    ctx.lineTo(x - size * 0.08, y);
                    ctx.lineTo(x - size * 0.2, y - size * 0.14);
                    ctx.moveTo(x - size * 0.08, y);
                    ctx.lineTo(x - size * 0.2, y + size * 0.14);
                    ctx.moveTo(x + size * 0.42, y);
                    ctx.lineTo(x + size * 0.08, y);
                    ctx.lineTo(x + size * 0.2, y - size * 0.14);
                    ctx.moveTo(x + size * 0.08, y);
                    ctx.lineTo(x + size * 0.2, y + size * 0.14);
                    ctx.stroke();
                    break;

                case 'circle':
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fill();
                    break;

                case 'danger_square':
                    // V17: 向下箭头 + 红色虚线 = 缩短
                    ctx.beginPath();
                    ctx.moveTo(x, y + size * 0.9);
                    ctx.lineTo(x + size * 0.7, y - size * 0.2);
                    ctx.lineTo(x + size * 0.25, y - size * 0.2);
                    ctx.lineTo(x + size * 0.25, y - size * 0.8);
                    ctx.lineTo(x - size * 0.25, y - size * 0.8);
                    ctx.lineTo(x - size * 0.25, y - size * 0.2);
                    ctx.lineTo(x - size * 0.7, y - size * 0.2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = '#ff0000';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([3, 3]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    break;

                case 'triangle':
                    ctx.beginPath();
                    ctx.moveTo(x, y - size);
                    ctx.lineTo(x + size, y + size);
                    ctx.lineTo(x - size, y + size);
                    ctx.closePath();
                    ctx.fill();
                    break;

                case 'diamond':
                    ctx.beginPath();
                    ctx.moveTo(x, y - size);
                    ctx.lineTo(x + size, y);
                    ctx.lineTo(x, y + size);
                    ctx.lineTo(x - size, y);
                    ctx.closePath();
                    ctx.fill();
                    break;

                case 'wind_star':
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle1 = i * Math.PI / 3;
                        const angle2 = i * Math.PI / 3 + Math.PI / 6;
                        const outerRadius = size * 0.95;
                        const innerRadius = size * 0.48;
                        ctx.lineTo(Math.cos(angle1) * outerRadius, Math.sin(angle1) * outerRadius);
                        ctx.lineTo(Math.cos(angle2) * innerRadius, Math.sin(angle2) * innerRadius);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(166, 227, 255, 0.75)';
                    ctx.lineWidth = 2;
                    const ringSize = size * 1.18 + Math.sin(time * 5) * 3;
                    ctx.beginPath();
                    ctx.arc(0, 0, ringSize, 0, Math.PI * 2);
                    ctx.stroke();
                    break;

                case 'barrier_sign':
                    // V17b: 橙色三角路障牌
                    ctx.beginPath();
                    ctx.moveTo(x, y - size * 0.9);
                    ctx.lineTo(x + size * 0.85, y + size * 0.7);
                    ctx.lineTo(x - size * 0.85, y + size * 0.7);
                    ctx.closePath();
                    ctx.fill();
                    // 内部砖块纹理
                    ctx.strokeStyle = 'rgba(120, 60, 0, 0.6)';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(x - size * 0.4, y + size * 0.1);
                    ctx.lineTo(x + size * 0.4, y + size * 0.1);
                    ctx.moveTo(x - size * 0.3, y + size * 0.35);
                    ctx.lineTo(x + size * 0.3, y + size * 0.35);
                    ctx.stroke();
                    // 边框
                    ctx.strokeStyle = 'rgba(255, 200, 50, 0.8)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(x, y - size * 0.9);
                    ctx.lineTo(x + size * 0.85, y + size * 0.7);
                    ctx.lineTo(x - size * 0.85, y + size * 0.7);
                    ctx.closePath();
                    ctx.stroke();
                    break;

                case 'hexagon':
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle = (i * Math.PI / 3) - Math.PI / 6;
                        const px = x + Math.cos(angle) * size;
                        const py = y + Math.sin(angle) * size;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fill();
                    break;
            }

            } // V19c: end fallback

            if (windRotation) {
                ctx.restore();
            }

            ctx.shadowBlur = 0;
        }

        function drawSnake(time) {
            const scale = getScaleFactors();
            const breathFreq = Math.max(0.5, 2 - Math.max(0, score) / 200);
            const breathIntensity = Math.sin(time * breathFreq) * 0.3 + 0.7;
            
            if (headGlowTimer > 0) {
                headGlowTimer -= 16;
            }
            
            // V17: 获取模块颜色（默认绿色）
            const mod = selectedModule || MODULE_TYPES.BALANCED;
            const hColor = mod.headColor || '#2ecc71';
            const hGlow = mod.headGlow || '#34d399';
            const bColor = mod.bodyColor || '#1e8449';
            const bGlow = mod.bodyGlow || '#059669';
            const hShape = mod.headShape || 'round';
            
            // V17: 先画蛇身特效（在蛇下方）
            snake.forEach((seg, index) => {
                if (!selectedModule || index === 0) return;
                const x = seg.x * cellSize + cellSize / 2;
                const y = seg.y * cellSize + cellSize / 2;
                const s = cellSize * 0.3;
                switch (selectedModule.trailEffect) {
                    case 'drip':
                        if (index >= snake.length - 3) {
                            const drip = Math.sin(time * 5 + index) * 0.5 + 0.5;
                            ctx.fillStyle = `rgba(123, 47, 247, ${drip * 0.4})`;
                            ctx.beginPath();
                            ctx.arc(x, y + s * 1.5, s * 0.4 * drip, 0, Math.PI * 2);
                            ctx.fill();
                        }
                        break;
                    case 'stripe':
                        if (index % 2 === 0) {
                            ctx.strokeStyle = 'rgba(200, 220, 240, 0.45)';
                            ctx.lineWidth = 2;
                            ctx.beginPath();
                            ctx.moveTo(x - s, y);
                            ctx.lineTo(x + s, y);
                            ctx.stroke();
                        }
                        break;
                    case 'ghost':
                        if (index <= 2) {
                            const fade = (3 - index) / 3;
                            ctx.fillStyle = `rgba(245, 200, 66, ${fade * 0.2})`;
                            ctx.beginPath();
                            ctx.arc(x, y, s * 1.5 * fade, 0, Math.PI * 2);
                            ctx.fill();
                        }
                        break;
                    case 'pulse':
                        const glow = Math.sin(time * 2 + index * 0.3) * 0.15 + 0.1;
                        ctx.fillStyle = `rgba(46, 204, 113, ${glow})`;
                        ctx.beginPath();
                        ctx.arc(x, y, s * 1.8, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                }
            });
            
            // V17fix: 地形 DoT 蛇身持续变色脉动
            let terrainTint = null;
            // V18c: debuff 全身变色（除蛇头）
            const nowDraw = Date.now();
            const isPoisonedDraw = nowDraw < poisonDebuffEnd;
            const isSlowedDraw = nowDraw < slowDebuffEnd;
            let debuffBodyGradientOverride = null;
            if (isPoisonedDraw) {
                const tPulse = Math.sin(time * 6) * 0.15 + 0.7;
                debuffBodyGradientOverride = { c1: `rgba(160, 50, 220, ${tPulse})`, c2: `rgba(100, 20, 160, ${tPulse})` };
                terrainTint = `rgba(160, 30, 200, 0.3)`;
            } else if (isSlowedDraw) {
                const tPulse = Math.sin(time * 4) * 0.15 + 0.7;
                debuffBodyGradientOverride = { c1: `rgba(80, 160, 255, ${tPulse})`, c2: `rgba(30, 80, 200, ${tPulse})` };
                terrainTint = `rgba(30, 100, 220, 0.3)`;
            }
            
            snake.forEach((seg, index) => {
                const x = seg.x * cellSize + cellSize / 2;
                const y = seg.y * cellSize + cellSize / 2;
                const size = index === 0 ? scale.snakeHead : scale.snakeBody;
                
                if (index === 0) {
                    if (headGlowTimer > 0) {
                        ctx.shadowColor = '#f1c40f';
                        ctx.shadowBlur = 20 + breathIntensity * 10;
                    } else {
                        ctx.shadowColor = hGlow;
                        ctx.shadowBlur = 10 + breathIntensity * 8;
                    }
                } else {
                    ctx.shadowColor = bGlow;
                    ctx.shadowBlur = 5 + breathIntensity * 5;
                }
                
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, size);
                if (index === 0) {
                    if (headGlowTimer > 0) {
                        gradient.addColorStop(0, '#f7dc6f');
